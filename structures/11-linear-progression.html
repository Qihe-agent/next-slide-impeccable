<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Timeline progress line grows from 80 to 1114 (current 2025 position)
  tl.to('#timelineProgress', { opacity: 1, duration: 0.3 }, 0.8);
  tl.to('#timelineProgress', { attr: { x2: 1114 }, duration: 1.8, ease: 'power2.inOut' }, 0.9);

  // Ticks fade in
  tl.to('.tick', { opacity: 0.7, duration: 0.3, stagger: 0.1 }, 1.0);

  // Nodes cascade (each tnode fades in, no transform so just opacity)
  tl.to('.tnode', { opacity: 1, duration: 0.5, stagger: 0.18, ease: 'power2.out' }, 1.4);

  // Now marker
  tl.to('#nowMarker', { opacity: 1, duration: 0.5 }, 2.4);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 3.0);

  // Counters
  document.querySelectorAll('.tnum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: 1.7 + i * 0.15, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = Math.round(this.targets()[0].v);
      }
    });
  });

  // ============ PERPETUAL: Traveler particle sliding along timeline ============
  gsap.to('#traveler', {
    opacity: 1, duration: 0.4, delay: 2.5
  });
  gsap.to('#traveler', {
    attr: { cx: 1114 }, duration: 4, repeat: -1, yoyo: false, ease: 'power1.inOut', delay: 2.5,
    onRepeat: function () {
      gsap.set('#traveler', { attr: { cx: 80 } });
    }
  });

  // ============ PERPETUAL: Current node pulse ============
  gsap.to('#currentPulse', {
    attr: { r: 24 }, opacity: 0.05, duration: 1.6, repeat: -1, yoyo: false, ease: 'power1.out',
    onRepeat: function () {
      gsap.set('#currentPulse', { attr: { r: 14 }, opacity: 0.5 });
    }
  });

  // ============ PERPETUAL: Card borders breath ============
  gsap.to('.tcard', {
    strokeOpacity: 0.85, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.12, delay: 3.2
  });

  // ============ PERPETUAL: Current card extra glow ============
  gsap.to('.tnode-current .tcard', {
    strokeWidth: 1.4, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5
  });

  // ============ PERPETUAL: Scan line sweep ============
  gsap.to('#scanLine', { attr: { x: 1400 }, duration: 7, repeat: -1, ease: 'none', delay: 1.2 });
})();
</script></body></html>
