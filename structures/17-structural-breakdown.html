<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Core scale in
  tl.fromTo('#core', { opacity: 0, scale: 0.6, transformOrigin: '700px 394px' }, { opacity: 1, scale: 1, duration: 0.7, ease: 'back.out(2)' }, 0.8);

  // Connection lines draw on
  tl.to('.conn', { strokeDashoffset: 0, duration: 0.7, stagger: 0.06, ease: 'power2.out' }, 1.4);

  // Junction dots appear
  tl.to('.jd', { opacity: 1, duration: 0.3, stagger: 0.05 }, 1.8);

  // Modules pop in
  tl.to('.mod', { opacity: 1, duration: 0.5, stagger: 0.08, ease: 'back.out(1.5)' }, 2.0);

  // Counters
  tl.to('#counters', { opacity: 1, duration: 0.5 }, 3.0);
  document.querySelectorAll('.cnt').forEach(el => {
    const target = parseInt(el.dataset.val);
    const obj = { v: 0 };
    tl.to(obj, {
      v: target, duration: 1.2, ease: 'power2.out',
      onUpdate: () => { el.textContent = Math.round(obj.v); }
    }, 3.1);
  });

  // ============ PERPETUAL: Pulse rings out from core ============
  gsap.to('#ring1', { attr: { r: 260 }, opacity: 0, duration: 3.2, repeat: -1, ease: 'power1.out', delay: 3.6, onStart: () => gsap.set('#ring1', { opacity: 0.4 }) });
  gsap.to('#ring2', { attr: { r: 260 }, opacity: 0, duration: 3.2, repeat: -1, ease: 'power1.out', delay: 5.2, onStart: () => gsap.set('#ring2', { opacity: 0.4 }) });

  // ============ PERPETUAL: Module border breath ============
  gsap.to('.mod-border', {
    strokeOpacity: 0.95, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.15, delay: 4
  });

  // ============ PERPETUAL: Flow particles along each connection ============
  const paths = document.querySelectorAll('.conn');
  const colors = ['#c4a35a', '#5dade2', '#3daa5a', '#bb8fce', '#f4845f', '#b33a3a', '#45b7a0', '#d4b96a'];
  const fpG = document.getElementById('flowParticles');
  const particles = [];
  paths.forEach((path, i) => {
    for (let k = 0; k < 2; k++) {
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('r', 2);
      c.setAttribute('fill', colors[i]);
      c.setAttribute('opacity', 0);
      c.setAttribute('filter', 'url(#glow)');
      fpG.appendChild(c);
      particles.push({ el: c, path, length: path.getTotalLength(), phase: Math.random(), speed: 0.005 + Math.random() * 0.003 });
    }
  });
  function tick() {
    particles.forEach(p => {
      p.phase = (p.phase + p.speed) % 1;
      const pt = p.path.getPointAtLength(p.phase * p.length);
      p.el.setAttribute('cx', pt.x);
      p.el.setAttribute('cy', pt.y);
      const d = Math.min(p.phase, 1 - p.phase) * 2;
      p.el.setAttribute('opacity', Math.min(d * 1.3, 0.85));
    });
    requestAnimationFrame(tick);
  }
  setTimeout(tick, 3600);

  // ============ PERPETUAL: Scan line over core ============
  const scanLine = document.createElementNS(ns, 'line');
  scanLine.setAttribute('x1', 600); scanLine.setAttribute('x2', 800);
  scanLine.setAttribute('stroke', '#c4a35a'); scanLine.setAttribute('stroke-width', 0.6); scanLine.setAttribute('opacity', 0.5);
  document.getElementById('core').appendChild(scanLine);
  let scanY = 330;
  function scanTick() {
    scanY += 1.2;
    if (scanY > 458) scanY = 330;
    scanLine.setAttribute('y1', scanY); scanLine.setAttribute('y2', scanY);
    requestAnimationFrame(scanTick);
  }
  setTimeout(scanTick, 3800);
})();
</script></body></html>
