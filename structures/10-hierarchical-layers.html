<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Layers appear bottom-up (foundation → application)
  const layerOrder = [1, 2, 3, 4, 5];
  layerOrder.forEach((layerNum, idx) => {
    tl.fromTo(`.layer[data-i="${layerNum}"]`,
      { opacity: 0, scaleY: 0.6, transformOrigin: `center ${layerNum === 1 ? 'bottom' : 'top'}` },
      { opacity: 1, scaleY: 1, duration: 0.5, ease: 'power2.out' },
      0.7 + idx * 0.2);
    // Sub-modules of this layer appear after layer appears
    tl.to(`.submod[data-layer="${layerNum}"]`,
      { opacity: 1, x: 0, duration: 0.4, stagger: 0.06, ease: 'power2.out' },
      0.9 + idx * 0.2);
  });

  // Footer
  tl.to('#footerBar', { opacity: 1, duration: 0.5 }, 2.3);

  // Counters
  document.querySelectorAll('.smNum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: 1.6 + i * 0.05, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = Math.round(this.targets()[0].v);
      }
    });
  });

  // ============ PERPETUAL: Data flow particles (rising from L1 to L5) ============
  const fpG = document.getElementById('flowParticles');
  const POOL = 22;
  const parts = [];
  for (let i = 0; i < POOL; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('fill', '#c4a35a');
    c.setAttribute('opacity', 0);
    fpG.appendChild(c);
    parts.push({ el: c, busy: false, x: 0, y: 0, vy: 0, r: 0, life: 0, maxLife: 0 });
  }
  function spawn(p) {
    p.busy = true;
    p.x = 60 + Math.random() * 1280;
    p.y = 720;
    p.vy = 0.5 + Math.random() * 0.7;
    p.r = 1 + Math.random() * 1.4;
    p.life = 0;
    p.maxLife = 600 + Math.random() * 200;
    p.el.setAttribute('r', p.r);
    p.el.setAttribute('opacity', 0);
  }
  let spawnAcc = 0;
  function flowTick() {
    spawnAcc++;
    if (spawnAcc > 5) {
      spawnAcc = 0;
      const free = parts.find(p => !p.busy);
      if (free) spawn(free);
    }
    parts.forEach(p => {
      if (!p.busy) return;
      p.y -= p.vy;
      p.life++;
      p.el.setAttribute('cx', p.x);
      p.el.setAttribute('cy', p.y);
      const fade = Math.min(p.life / 30, 1) * Math.max(1 - (p.life - p.maxLife * 0.7) / (p.maxLife * 0.3), 0);
      p.el.setAttribute('opacity', Math.min(fade * 0.5, 0.5));
      if (p.y < 100 || p.life > p.maxLife) {
        p.busy = false;
        p.el.setAttribute('opacity', 0);
      }
    });
    requestAnimationFrame(flowTick);
  }
  setTimeout(flowTick, 2500);

  // ============ PERPETUAL: Layer border breath (each layer breath at own rhythm) ============
  gsap.to('.layer-border', {
    strokeOpacity: 0.9, strokeWidth: 1.4, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.15, delay: 3.5
  });

  // ============ PERPETUAL: Layer highlight cycle (one layer "active" at a time) ============
  const layers = document.querySelectorAll('.layer');
  let activeLayer = 0;
  function cycleLayer() {
    layers.forEach((l, i) => {
      const rect = l.querySelector('rect:first-child');
      gsap.to(rect, {
        fillOpacity: i === activeLayer ? 0.65 : 0.4,
        duration: 0.5, ease: 'power2.out'
      });
    });
    activeLayer = (activeLayer + 1) % layers.length;
  }
  setInterval(cycleLayer, 1600);
  setTimeout(cycleLayer, 3500);
})();
</script></body></html>
