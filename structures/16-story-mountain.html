<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Arc draws on (left to right)
  tl.to('#arc', { strokeDashoffset: 0, duration: 2.0, ease: 'power2.inOut' }, 0.7);

  // Act labels fade in along arc
  tl.to('.act-lab', { opacity: 0.8, duration: 0.4, stagger: 0.12 }, 1.3);

  // Stage markers pop in sequence
  tl.to('.stage', { opacity: 1, duration: 0.45, stagger: 0.18, ease: 'back.out(2.2)' }, 1.6);

  // Connectors draw in
  tl.to('.conn', { opacity: 0.55, duration: 0.4, stagger: 0.1 }, 2.4);

  // Cards cascade up from below
  tl.fromTo('.card', { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.55, stagger: 0.12, ease: 'power2.out' }, 2.7);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 3.6);

  // ============ PERPETUAL: Climax pulse ring ============
  gsap.to('#climaxPulse', { attr: { r: 36 }, opacity: 0, duration: 2.2, repeat: -1, ease: 'power1.out', delay: 3.5 });

  // ============ PERPETUAL: Light dot traveling along arc ============
  const arcPath = document.getElementById('arc');
  const arcLen = arcPath.getTotalLength();
  const arcDot = document.getElementById('arcDot');
  let t = 0;
  function arcTick() {
    t = (t + 0.0016) % 1;
    const pt = arcPath.getPointAtLength(t * arcLen);
    arcDot.setAttribute('cx', pt.x);
    arcDot.setAttribute('cy', pt.y);
    const fade = Math.min(t, 1 - t) * 2;
    arcDot.setAttribute('opacity', Math.min(fade * 1.4, 0.95));
    requestAnimationFrame(arcTick);
  }
  setTimeout(arcTick, 3200);

  // ============ PERPETUAL: Peak particles rising ============
  const pG = document.getElementById('peakParticles');
  const particles = [];
  for (let i = 0; i < 14; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', 1 + Math.random() * 1.4);
    c.setAttribute('fill', '#c4a35a');
    c.setAttribute('opacity', 0);
    c.setAttribute('filter', 'url(#glow)');
    pG.appendChild(c);
    particles.push({
      el: c,
      x: 700 + (Math.random() - 0.5) * 24,
      y: 105,
      life: Math.random(),
      speed: 0.003 + Math.random() * 0.004,
      drift: (Math.random() - 0.5) * 0.4
    });
  }
  function peakTick() {
    particles.forEach(p => {
      p.life += p.speed;
      if (p.life > 1) {
        p.life = 0;
        p.x = 700 + (Math.random() - 0.5) * 24;
      }
      const yOff = p.life * 70;
      p.el.setAttribute('cx', p.x + p.drift * yOff);
      p.el.setAttribute('cy', p.y - yOff);
      const op = p.life < 0.15 ? (p.life / 0.15) * 0.8 : (1 - p.life) * 0.8;
      p.el.setAttribute('opacity', op);
    });
    requestAnimationFrame(peakTick);
  }
  setTimeout(peakTick, 3500);

  // ============ PERPETUAL: Climax card breath ============
  gsap.to('.climax-card rect:first-child', { strokeWidth: 2, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 });

  // ============ PERPETUAL: Non-climax card border subtle breathing (strokeOpacity, not filter brightness — brightness tween without explicit starting value makes GSAP interpolate from 0) ============
  gsap.to('.card:not(.climax-card) rect:first-child', {
    strokeOpacity: 0.95,
    duration: 3.4,
    repeat: -1,
    yoyo: true,
    ease: 'sine.inOut',
    stagger: 0.2,
    delay: 4.2
  });
})();
</script></body></html>
