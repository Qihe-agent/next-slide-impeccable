<!DOCTYPE html><html lang="zh"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>23 · Isometric Map — Asyre Infra Topology</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;color:#e8e4df;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
.wrap svg{width:100%;height:100%;max-width:100vw;max-height:100vh;object-fit:contain}
</style></head><body><div class="wrap"><svg id="svg" viewBox="0 0 1400 788" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="gridSmall" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#c4a35a" stroke-width="0.15" opacity="0.2"/>
  </pattern>
  <pattern id="gridLarge" width="100" height="100" patternUnits="userSpaceOnUse">
    <rect width="100" height="100" fill="url(#gridSmall)"/>
    <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#c4a35a" stroke-width="0.4" opacity="0.25"/>
  </pattern>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="softGlow" x="-75%" y="-75%" width="250%" height="250%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="1400" height="788" fill="#0a0a0b"/>
<rect width="1400" height="788" fill="url(#gridLarge)"/>

<text x="30" y="30" font-family="JetBrains Mono,monospace" font-size="9" fill="#c4a35a" opacity="0.35" letter-spacing="2">IMPECCABLE · v2</text>
<g id="cornerRing" transform="translate(1340, 40)">
  <circle r="22" fill="none" stroke="#c4a35a" stroke-width="0.6" opacity="0.3"/>
  <circle id="ringInner" r="16" fill="none" stroke="#c4a35a" stroke-width="0.4" opacity="0.35" stroke-dasharray="3,4"/>
  <circle r="9" fill="#c4a35a" opacity="0.08"/>
  <text y="4" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#c4a35a" opacity="0.6">23</text>
</g>

<!-- Header -->
<text x="700" y="50" text-anchor="middle" font-family="Noto Serif SC" font-size="20" font-weight="700" fill="#c4a35a" opacity="0" class="title">Asyre 云基础设施 · 等距地图</text>
<text x="700" y="72" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#e8e4df" letter-spacing="4" opacity="0" class="subtitle">30° ISOMETRIC · 5 NODES · DATA FLOW TOPOLOGY</text>

<!-- Isometric floor grid (pre-drawn polygon + lines) -->
<g id="floorGrid" opacity="0">
  <!-- Floor diamond: corners iso(0,0), iso(1000,0), iso(1000,1000), iso(0,1000) -->
  <polygon points="700,250 1133,500 700,750 267,500" fill="#0e1218" fill-opacity="0.6" stroke="#c4a35a" stroke-width="0.6" stroke-opacity="0.4"/>
  <!-- Grid lines every 100 units -->
  <g id="gridLines" stroke="#c4a35a" stroke-width="0.25" opacity="0.25"></g>
  <!-- Compass hint · moved to top-left (90, 200) to avoid collision with footer text (y=725+) -->
  <g transform="translate(90, 200)">
    <!-- Dashed box frame to separate from background -->
    <rect x="-42" y="-36" width="98" height="88" rx="2" fill="#0a0a0b" fill-opacity="0.6" stroke="#c4a35a" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="3,4"/>
    <!-- Axis lines -->
    <line x1="0" y1="0" x2="22" y2="13" stroke="#c4a35a" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="-22" y2="13" stroke="#c4a35a" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#c4a35a" stroke-width="0.8" opacity="0.7"/>
    <!-- Origin dot -->
    <circle cx="0" cy="0" r="1.4" fill="#c4a35a" opacity="0.8"/>
    <!-- Direction labels -->
    <text x="30" y="18" font-family="JetBrains Mono" font-size="9" fill="#c4a35a" opacity="0.75">E</text>
    <text x="-37" y="18" font-family="JetBrains Mono" font-size="9" fill="#c4a35a" opacity="0.75">W</text>
    <text x="0" y="-26" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#c4a35a" opacity="0.75">N</text>
    <!-- Caption inside box -->
    <text x="0" y="42" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#c4a35a" opacity="0.5" letter-spacing="2">ISO 30°</text>
  </g>
</g>

<!-- Buildings, connectors, labels all generated in JS for iso-math consistency -->
<g id="connectors" style="pointer-events:none"></g>
<g id="buildings"></g>
<g id="packetsLayer" style="pointer-events:none"></g>
<g id="labels"></g>

<!-- Right-side legend panel -->
<g id="legend" opacity="0">
  <rect x="1180" y="105" width="180" height="175" rx="3" fill="#1a1410" fill-opacity="0.75" stroke="#c4a35a" stroke-width="0.7" stroke-opacity="0.6"/>
  <text x="1195" y="125" font-family="JetBrains Mono" font-size="9" fill="#c4a35a" letter-spacing="2">LEGEND</text>
  <!-- User dot -->
  <circle cx="1200" cy="145" r="4" fill="#bb8fce"/>
  <text x="1212" y="149" font-family="Noto Sans SC" font-size="10" fill="#e8e4df">用户节点</text>
  <text x="1350" y="149" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8578">front · short</text>
  <!-- Gateway -->
  <rect x="1196" y="158" width="8" height="8" fill="#5dade2"/>
  <text x="1212" y="167" font-family="Noto Sans SC" font-size="10" fill="#e8e4df">入口网关</text>
  <text x="1350" y="167" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8578">API · LiteLLM</text>
  <!-- Core -->
  <rect x="1196" y="178" width="8" height="8" fill="#c4a35a"/>
  <text x="1212" y="187" font-family="Noto Sans SC" font-size="10" fill="#e8e4df">核心服务 ★</text>
  <text x="1350" y="187" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8578">agent · skills</text>
  <!-- VecDB -->
  <rect x="1196" y="198" width="8" height="8" fill="#3daa5a"/>
  <text x="1212" y="207" font-family="Noto Sans SC" font-size="10" fill="#e8e4df">向量数据库</text>
  <text x="1350" y="207" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8578">RAG · memory</text>
  <!-- Monitor -->
  <rect x="1196" y="218" width="8" height="8" fill="#f4845f"/>
  <text x="1212" y="227" font-family="Noto Sans SC" font-size="10" fill="#e8e4df">监控观测</text>
  <text x="1350" y="227" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8578">logs · metrics</text>

  <line x1="1195" y1="244" x2="1350" y2="244" stroke="#c4a35a" stroke-width="0.3" opacity="0.3"/>
  <text x="1195" y="260" font-family="JetBrains Mono" font-size="8" fill="#c4a35a" opacity="0.7" letter-spacing="2">DATA PACKETS</text>
  <text x="1195" y="274" font-family="JetBrains Mono" font-size="8" fill="#8a8578">gold dots · 1s cycle</text>
</g>

<!-- Footer -->
<g id="footerSum" opacity="0">
  <line x1="30" y1="725" x2="1370" y2="725" stroke="#c4a35a" stroke-width="0.3" opacity="0.3"/>
  <text x="30" y="747" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.7" letter-spacing="2">5 节点 · 30° 等距投影 · 请求粒子沿连接线从用户流到核心，再写入向量库，由监控回看</text>
  <text x="1370" y="747" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.7" letter-spacing="2">TOPOLOGY · AWS SG · 2026</text>
</g>

<text x="30" y="768" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.3" letter-spacing="2">STR-ISO-23 / REV.A — IMPECCABLE</text>
<text x="1370" y="768" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.3" letter-spacing="2">ISOMETRIC · 30° PROJECTION</text>

</svg></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // ============ ISOMETRIC PROJECTION ============
  // Floor coord (fx, fy, fz) → screen (sx, sy)
  // scale_xy = 0.433 (cos30°), 0.25 (sin30°); z_scale = 0.6 for taller buildings
  const OFF_X = 700, OFF_Y = 250;
  const iso = (x, y, z = 0) => ({
    x: OFF_X + (x - y) * 0.433,
    y: OFF_Y + (x + y) * 0.25 - z * 0.6
  });

  // ============ GRID LINES ============
  const gridLines = document.getElementById('gridLines');
  for (let i = 100; i < 1000; i += 100) {
    // horizontal floor lines (x = const, y from 0 to 1000)
    let p1 = iso(i, 0), p2 = iso(i, 1000);
    let l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', p1.x); l.setAttribute('y1', p1.y);
    l.setAttribute('x2', p2.x); l.setAttribute('y2', p2.y);
    gridLines.appendChild(l);
    // vertical floor lines (y = const, x from 0 to 1000)
    p1 = iso(0, i); p2 = iso(1000, i);
    l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', p1.x); l.setAttribute('y1', p1.y);
    l.setAttribute('x2', p2.x); l.setAttribute('y2', p2.y);
    gridLines.appendChild(l);
  }

  // ============ BUILDINGS DEFINITION ============
  // Each building: { id, label, floor: [fx, fy], base: [bw, bh], height, color, bgFill }
  const buildings = [
    { id: 'users',    cn: '用户',    en: 'USER CLUSTER',   floor: [750, 850], base: [150, 120], height: 50,  color: '#bb8fce', bg: '#181220', num: 'N1' },
    { id: 'gateway',  cn: '入口网关', en: 'API GATEWAY',    floor: [450, 700], base: [180, 140], height: 90,  color: '#5dade2', bg: '#10161e', num: 'N2' },
    { id: 'core',     cn: '核心服务', en: 'ASYRE CORE ★',  floor: [350, 350], base: [280, 280], height: 180, color: '#c4a35a', bg: '#1a1410', num: 'N3' },
    { id: 'vecdb',    cn: '向量库',   en: 'VECTOR DB',     floor: [750, 150], base: [180, 200], height: 120, color: '#3daa5a', bg: '#0f1e12', num: 'N4' },
    { id: 'monitor',  cn: '监控',    en: 'OBSERVABILITY', floor: [100, 100], base: [180, 180], height: 100, color: '#f4845f', bg: '#1e1410', num: 'N5' },
  ];

  // Connectors (between buildings, by id pair). Packets flow along these.
  const connectors = [
    { from: 'users',   to: 'gateway', color: '#bb8fce' },
    { from: 'gateway', to: 'core',    color: '#5dade2' },
    { from: 'core',    to: 'vecdb',   color: '#3daa5a' },
    { from: 'core',    to: 'monitor', color: '#f4845f' },
    { from: 'gateway', to: 'monitor', color: '#f4845f' },
  ];

  // ============ BUILDING RENDERING ============
  const bGroup = document.getElementById('buildings');
  const labelGroup = document.getElementById('labels');

  // Sort buildings by floor distance from camera (back = first, front = last for correct occlusion)
  // In our isometric, back-left = (0, 0), front = (1000, 1000). So draw order by (fx + fy) descending.
  const sorted = [...buildings].sort((a, b) => (a.floor[0] + a.floor[1]) - (b.floor[0] + b.floor[1]));

  sorted.forEach((bld, idx) => {
    const [fx, fy] = bld.floor;
    const [bw, bh] = bld.base;
    const h = bld.height;
    // 8 corners
    const TBL = iso(fx, fy, h);
    const TBR = iso(fx + bw, fy, h);
    const TFR = iso(fx + bw, fy + bh, h);
    const TFL = iso(fx, fy + bh, h);
    const BBL = iso(fx, fy, 0);
    const BBR = iso(fx + bw, fy, 0);
    const BFR = iso(fx + bw, fy + bh, 0);
    const BFL = iso(fx, fy + bh, 0);

    const g = document.createElementNS(ns, 'g');
    g.setAttribute('class', 'bld');
    g.setAttribute('data-id', bld.id);
    g.setAttribute('opacity', 0);

    // Right face (east): TBR, TFR, BFR, BBR — darkest
    const rightFace = document.createElementNS(ns, 'polygon');
    rightFace.setAttribute('points', `${TBR.x},${TBR.y} ${TFR.x},${TFR.y} ${BFR.x},${BFR.y} ${BBR.x},${BBR.y}`);
    rightFace.setAttribute('fill', bld.bg);
    rightFace.setAttribute('fill-opacity', '0.95');
    rightFace.setAttribute('stroke', bld.color);
    rightFace.setAttribute('stroke-width', '0.8');
    rightFace.setAttribute('stroke-opacity', '0.6');
    g.appendChild(rightFace);

    // Front face (south): TFL, TFR, BFR, BFL — mid brightness
    const frontFace = document.createElementNS(ns, 'polygon');
    frontFace.setAttribute('points', `${TFL.x},${TFL.y} ${TFR.x},${TFR.y} ${BFR.x},${BFR.y} ${BFL.x},${BFL.y}`);
    frontFace.setAttribute('fill', bld.bg);
    frontFace.setAttribute('fill-opacity', '0.82');
    frontFace.setAttribute('stroke', bld.color);
    frontFace.setAttribute('stroke-width', '0.8');
    frontFace.setAttribute('stroke-opacity', '0.7');
    g.appendChild(frontFace);

    // Top face: TBL, TBR, TFR, TFL — brightest (has color tint)
    const topFace = document.createElementNS(ns, 'polygon');
    topFace.setAttribute('points', `${TBL.x},${TBL.y} ${TBR.x},${TBR.y} ${TFR.x},${TFR.y} ${TFL.x},${TFL.y}`);
    topFace.setAttribute('fill', bld.color);
    topFace.setAttribute('fill-opacity', bld.id === 'core' ? '0.3' : '0.18');
    topFace.setAttribute('stroke', bld.color);
    topFace.setAttribute('stroke-width', bld.id === 'core' ? '1.6' : '1.1');
    topFace.setAttribute('stroke-opacity', '0.95');
    if (bld.id === 'core') topFace.setAttribute('filter', 'url(#glow)');
    g.appendChild(topFace);

    // Top cross lines (X pattern) for tech feel
    const xl1 = document.createElementNS(ns, 'line');
    xl1.setAttribute('x1', TBL.x); xl1.setAttribute('y1', TBL.y);
    xl1.setAttribute('x2', TFR.x); xl1.setAttribute('y2', TFR.y);
    xl1.setAttribute('stroke', bld.color); xl1.setAttribute('stroke-width', '0.3'); xl1.setAttribute('opacity', '0.35');
    g.appendChild(xl1);
    const xl2 = document.createElementNS(ns, 'line');
    xl2.setAttribute('x1', TBR.x); xl2.setAttribute('y1', TBR.y);
    xl2.setAttribute('x2', TFL.x); xl2.setAttribute('y2', TFL.y);
    xl2.setAttribute('stroke', bld.color); xl2.setAttribute('stroke-width', '0.3'); xl2.setAttribute('opacity', '0.35');
    g.appendChild(xl2);

    // Top label (centered on top face)
    const tcx = (TBL.x + TFR.x) / 2;
    const tcy = (TBL.y + TFR.y) / 2;

    const numTxt = document.createElementNS(ns, 'text');
    numTxt.setAttribute('x', tcx); numTxt.setAttribute('y', tcy - 10);
    numTxt.setAttribute('text-anchor', 'middle');
    numTxt.setAttribute('font-family', 'JetBrains Mono');
    numTxt.setAttribute('font-size', '9');
    numTxt.setAttribute('letter-spacing', '2');
    numTxt.setAttribute('fill', bld.color);
    numTxt.setAttribute('opacity', '0.9');
    numTxt.textContent = bld.num;
    g.appendChild(numTxt);

    const cnTxt = document.createElementNS(ns, 'text');
    cnTxt.setAttribute('x', tcx); cnTxt.setAttribute('y', tcy + 8);
    cnTxt.setAttribute('text-anchor', 'middle');
    cnTxt.setAttribute('font-family', 'Noto Serif SC');
    cnTxt.setAttribute('font-size', bld.id === 'core' ? '18' : '13');
    cnTxt.setAttribute('font-weight', '700');
    cnTxt.setAttribute('fill', bld.color);
    cnTxt.textContent = bld.cn;
    g.appendChild(cnTxt);

    const enTxt = document.createElementNS(ns, 'text');
    enTxt.setAttribute('x', tcx); enTxt.setAttribute('y', tcy + 23);
    enTxt.setAttribute('text-anchor', 'middle');
    enTxt.setAttribute('font-family', 'JetBrains Mono');
    enTxt.setAttribute('font-size', '8');
    enTxt.setAttribute('letter-spacing', '2');
    enTxt.setAttribute('fill', '#e8e4df');
    enTxt.setAttribute('opacity', '0.75');
    enTxt.textContent = bld.en;
    g.appendChild(enTxt);

    bGroup.appendChild(g);

    // Store screen top-center for connectors
    bld._topCenter = { x: tcx, y: tcy - 2 };
  });

  // ============ CONNECTORS ============
  const connGroup = document.getElementById('connectors');
  const bldMap = Object.fromEntries(buildings.map(b => [b.id, b]));

  const connPaths = [];
  connectors.forEach((c) => {
    const from = bldMap[c.from]._topCenter;
    const to = bldMap[c.to]._topCenter;
    const path = document.createElementNS(ns, 'path');
    // Curved path: quadratic control at midpoint raised up
    const midx = (from.x + to.x) / 2;
    const midy = Math.min(from.y, to.y) - 28;
    const d = `M ${from.x} ${from.y} Q ${midx} ${midy}, ${to.x} ${to.y}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', c.color);
    path.setAttribute('stroke-width', 1.3);
    path.setAttribute('stroke-opacity', 0.65);
    path.setAttribute('stroke-dasharray', 400);
    path.setAttribute('stroke-dashoffset', 400);
    path.setAttribute('class', 'conn');
    connGroup.appendChild(path);
    connPaths.push({ el: path, from: c.from, to: c.to, color: c.color });
  });

  // ============ TIMELINE ============
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  tl.to('#floorGrid', { opacity: 1, duration: 0.6 }, 0.8);

  // Buildings scale up from floor
  tl.fromTo('.bld', { opacity: 0, scaleY: 0.1, transformOrigin: 'center bottom' },
    { opacity: 1, scaleY: 1, duration: 0.7, stagger: 0.15, ease: 'back.out(1.5)' }, 1.2);

  // Connectors draw on
  tl.to('.conn', { strokeDashoffset: 0, duration: 0.7, stagger: 0.08 }, 2.2);

  // Legend
  tl.to('#legend', { opacity: 1, duration: 0.5 }, 2.5);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 2.8);

  // ============ PERPETUAL: Core top ring pulse ============
  const coreTop = buildings.find(b => b.id === 'core');
  if (coreTop) {
    const ring = document.createElementNS(ns, 'ellipse');
    ring.setAttribute('cx', coreTop._topCenter.x);
    ring.setAttribute('cy', coreTop._topCenter.y);
    ring.setAttribute('rx', 60); ring.setAttribute('ry', 30);
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', coreTop.color);
    ring.setAttribute('stroke-width', 0.8);
    ring.setAttribute('opacity', 0);
    ring.setAttribute('filter', 'url(#softGlow)');
    document.getElementById('svg').appendChild(ring);
    gsap.to(ring, { attr: { rx: 140, ry: 70 }, opacity: 0, duration: 2.4, repeat: -1, ease: 'power1.out', delay: 3, onStart: () => gsap.set(ring, { opacity: 0.6 }) });
  }

  // ============ PERPETUAL: Packets along connectors ============
  const packetsLayer = document.getElementById('packetsLayer');
  const packets = [];
  connPaths.forEach(c => {
    for (let k = 0; k < 2; k++) {
      const p = document.createElementNS(ns, 'circle');
      p.setAttribute('r', 3);
      p.setAttribute('fill', c.color);
      p.setAttribute('opacity', 0);
      p.setAttribute('filter', 'url(#glow)');
      packetsLayer.appendChild(p);
      packets.push({
        el: p, path: c.el, length: c.el.getTotalLength(),
        phase: Math.random(), speed: 0.006 + Math.random() * 0.003
      });
    }
  });
  function packetTick() {
    packets.forEach(pk => {
      pk.phase = (pk.phase + pk.speed) % 1;
      const pt = pk.path.getPointAtLength(pk.phase * pk.length);
      pk.el.setAttribute('cx', pt.x);
      pk.el.setAttribute('cy', pt.y);
      const fade = Math.min(pk.phase, 1 - pk.phase) * 2;
      pk.el.setAttribute('opacity', Math.min(fade * 1.3, 0.9));
    });
    requestAnimationFrame(packetTick);
  }
  setTimeout(packetTick, 3200);

  // ============ PERPETUAL: Building top face subtle color breath ============
  gsap.to('.bld polygon:nth-child(3)', {
    fillOpacity: 0.35, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.3, delay: 3.4
  });
})();
</script></body></html>
