<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // 3 circles slide in from their outer positions (grow r from 0 to 200 + fade in)
  tl.fromTo('#c-ai', { attr: { r: 0 }, opacity: 0 }, { attr: { r: 200 }, opacity: 1, duration: 0.9, ease: 'power2.out' }, 0.8);
  tl.fromTo('#c-biz', { attr: { r: 0 }, opacity: 0 }, { attr: { r: 200 }, opacity: 1, duration: 0.9, ease: 'power2.out' }, 1.0);
  tl.fromTo('#c-data', { attr: { r: 0 }, opacity: 0 }, { attr: { r: 200 }, opacity: 1, duration: 0.9, ease: 'power2.out' }, 1.2);

  // Circle labels
  tl.to('#circleLabels', { opacity: 1, duration: 0.5 }, 1.8);
  // Halos fade in with labels (each circle center gets a colored glow point)
  tl.to('#aiHaloEl, #bizHaloEl, #dataHaloEl', { opacity: 1, duration: 0.6, stagger: 0.1 }, 1.8);

  // Center glow
  tl.to('#centerGlow', { opacity: 1, duration: 0.8 }, 2.0);

  // Zone markers pop in (dots + numbers)
  tl.to('.zdot', { opacity: 1, duration: 0.4, stagger: 0.08, ease: 'back.out(2)' }, 2.2);
  tl.to('.znum', { opacity: 1, duration: 0.3, stagger: 0.08 }, 2.3);

  // Right panel
  tl.to('#rightPanel', { opacity: 1, duration: 0.5 }, 2.3);
  tl.to('.zr', { opacity: 1, duration: 0.4, stagger: 0.1, ease: 'power2.out' }, 2.5);

  // Distribution bars grow
  tl.to('.distBar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.8, stagger: 0.15, ease: 'power2.out'
  }, 3.4);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 3.8);

  // ============ PERPETUAL: Center dot pulse (triple intersection star) ============
  gsap.to('#centerDot', {
    attr: { r: 18 }, duration: 1.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4
  });

  // ============ PERPETUAL: Center card in right panel glow ============
  gsap.to('#centerCard', {
    strokeWidth: 1.6, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.2
  });

  // ============ PERPETUAL: Center glow breath ============
  gsap.to('#centerGlow', {
    opacity: 0.55, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.5
  });

  // ============ PERPETUAL: 3 circle-center halos breath (staggered so they're not synced) ============
  gsap.to('#aiHaloEl', { opacity: 0.55, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.2 });
  gsap.to('#bizHaloEl', { opacity: 0.55, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.5 });
  gsap.to('#dataHaloEl', { opacity: 0.55, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.8 });

  // ============ PERPETUAL: 3 circles subtle breath on stroke ============
  gsap.to('#c-ai, #c-biz, #c-data', {
    strokeWidth: 2.8, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.3, delay: 4
  });

  // ============ PERPETUAL: Zone dots blink ============
  gsap.to('.zdot:not(#centerDot)', {
    opacity: 0.55, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.15, delay: 4.8
  });
})();
