<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';

  // ============ PERPETUAL: Corner ring ============
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // ============ PERPETUAL: Waterline wave morph (continuous d attribute interpolation) ============
  // Use a parameterized wave with sin-time offset, 8 Q segments across the full width
  const waterPath = document.getElementById('waterline');
  const baseY = 320;
  const amp = 6;  // wave height
  function waveTick() {
    const t = performance.now() / 1600;
    // 8 control + anchor pairs
    let d = `M 0,${baseY + Math.sin(t) * amp}`;
    for (let i = 1; i <= 8; i++) {
      const x = i * 175;
      const cx = x - 87;
      const cy = baseY + Math.sin(t + i * 0.5) * amp;
      const ay = baseY + Math.sin(t + i) * amp * 0.5;
      d += ` Q ${cx},${cy} ${x},${ay}`;
    }
    waterPath.setAttribute('d', d);
    requestAnimationFrame(waveTick);
  }
  waveTick();

  // ============ PERPETUAL: Bubble rise (DOM pool) ============
  const bg = document.getElementById('bubbles');
  const POOL = 18;
  const bubbles = [];
  for (let i = 0; i < POOL; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('fill', '#c4d8ea');
    c.setAttribute('opacity', 0);
    bg.appendChild(c);
    bubbles.push({ el: c, busy: false, x: 0, y: 0, vy: 0, r: 1, drift: 0, life: 0, maxLife: 0 });
  }
  function spawnBubble(b) {
    b.busy = true;
    b.x = 80 + Math.random() * 1240; // full-width pool
    b.y = 780 + Math.random() * 20;
    b.vy = 0.6 + Math.random() * 0.8;
    b.r = 0.8 + Math.random() * 1.8;
    b.drift = (Math.random() - 0.5) * 0.4;
    b.life = 0;
    b.maxLife = 300 + Math.random() * 220;
    b.el.setAttribute('r', b.r);
    b.el.setAttribute('opacity', 0);
  }
  let bSpawn = 0;
  function bubbleTick() {
    bSpawn++;
    if (bSpawn > 10) {
      bSpawn = 0;
      const free = bubbles.find(b => !b.busy);
      if (free) spawnBubble(free);
    }
    bubbles.forEach(b => {
      if (!b.busy) return;
      b.y -= b.vy;
      b.x += b.drift;
      b.life++;
      b.el.setAttribute('cx', b.x);
      b.el.setAttribute('cy', b.y);
      const fade = Math.min(b.life / 40, 1) * Math.max(1 - (b.life - b.maxLife * 0.7) / (b.maxLife * 0.3), 0);
      b.el.setAttribute('opacity', Math.min(fade * 0.55, 0.55));
      if (b.y < 325 || b.life > b.maxLife) {
        b.busy = false;
        b.el.setAttribute('opacity', 0);
      }
    });
    requestAnimationFrame(bubbleTick);
  }
  bubbleTick();

  // ============ PERPETUAL: Iceberg tip gentle sway ============
  // svgOrigin (SVG user-space) not transformOrigin — see STRUCTURE_PRESETS §硬规则 5
  gsap.to('#icebergTip', { rotation: 1, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut', svgOrigin: '350 320', delay: 3 });

  // ============ ENTRANCE TIMELINE ============
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Waterline fade in
  tl.to('#waterline', { opacity: 1, duration: 0.7 }, 0.6);
  tl.to('.wl-label', { opacity: 0.65, duration: 0.5 }, 0.7);

  // Iceberg tip draws in
  tl.fromTo('#icebergTip',
    { opacity: 0, y: -20 },
    { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out' }, 1.0);

  // Iceberg body reveals (mask from waterline down)
  tl.fromTo('#icebergBody',
    { opacity: 0, scaleY: 0, transformOrigin: '350px 320px' },
    { opacity: 1, scaleY: 1, duration: 1.2, ease: 'power2.out' }, 1.3);

  // Above cards cascade in (right side)
  tl.to('.above-card', { opacity: 1, x: 0, duration: 0.5, stagger: 0.12, ease: 'power2.out' }, 1.2);

  // Below cards cascade in (deeper the later)
  tl.to('.below-card', { opacity: 1, y: 0, duration: 0.5, stagger: 0.09, ease: 'power2.out' }, 1.9);

  // Counters (below cards + summary)
  document.querySelectorAll('.cnt').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: 2.3 + i * 0.1, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = Math.round(v);
      }
    });
  });

  // ============ PERPETUAL: Card border breathing (below cards) ============
  gsap.to('.below-card rect:first-child', {
    strokeOpacity: 0.95, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut',
    stagger: 0.1, delay: 3.5
  });

  // ============ PERPETUAL: Above cards gentle pulse ============
  gsap.to('.above-card rect:first-child', {
    strokeOpacity: 0.9, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut',
    stagger: 0.12, delay: 3.8
  });
})();
</script></body></html>
