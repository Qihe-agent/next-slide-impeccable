<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // Build 24 hourly bars (high activity peak around hour 18-21)
  const activity = [8, 5, 3, 2, 3, 5, 10, 18, 28, 35, 40, 45, 48, 46, 42, 44, 50, 58, 68, 72, 65, 52, 38, 22];
  const barsG = document.getElementById('hourlyBars');
  activity.forEach((v, i) => {
    const b = document.createElementNS(ns, 'rect');
    const h = v * 1.3;
    b.setAttribute('x', i * 19);
    b.setAttribute('y', 70 - h);
    b.setAttribute('width', 14);
    b.setAttribute('height', 0);
    b.setAttribute('fill', '#c4a35a');
    b.setAttribute('fill-opacity', i === 19 ? 0.9 : 0.5);
    b.classList.add('abar');
    b.dataset.h = h;
    barsG.appendChild(b);
  });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3')
    .to('#liveIndicator', { opacity: 1, duration: 0.4 }, '-=0.2');

  // KPI cards (each has transform="translate(X, 96)" — only fade in, don't touch y)
  tl.to('.kpi', { opacity: 1, duration: 0.5, stagger: 0.1, ease: 'power2.out' }, 0.6);

  // MRR chart
  tl.to('#mrrChart', { opacity: 1, duration: 0.5 }, 1.2);
  tl.to('#mrrLine', { strokeDashoffset: 0, duration: 1.6, ease: 'power2.inOut' }, 1.4);
  tl.to('.mrr-area', { opacity: 1, duration: 0.8 }, 2.4);
  tl.to('#mrrLast', { opacity: 1, duration: 0.4 }, 2.8);
  tl.to('#mrrLastLabel', { opacity: 1, duration: 0.4 }, 2.9);

  // Activity chart + bars
  tl.to('#activityChart', { opacity: 1, duration: 0.5 }, 1.6);
  tl.to('.abar', {
    attr: { y: (i, el) => 70 - parseFloat(el.dataset.h), height: (i, el) => parseFloat(el.dataset.h) },
    duration: 0.7,
    stagger: 0.02,
    ease: 'power2.out'
  }, 1.9);

  // Health panel
  tl.to('#healthPanel', { opacity: 1, duration: 0.5 }, 2.0);

  // Table
  tl.to('#tableBlock', { opacity: 1, duration: 0.5 }, 2.4);
  tl.to('.tr', { opacity: 1, duration: 0.4, stagger: 0.1 }, 2.6);

  // Footer
  tl.to('#footerBar', { opacity: 1, duration: 0.5 }, 3.2);

  // Counters
  [
    { sel: '#k_mrr', target: 2100, delay: 1.0 },
    { sel: '#k_dau', target: 128, delay: 1.2 },
    { sel: '#k_new', target: 342, delay: 1.4 },
    { sel: '#k_hp', target: 99, delay: 1.6 },
    { sel: '#k_churn', target: 2.8, delay: 1.8, dec: 1 }
  ].forEach(c => {
    const el = document.querySelector(c.sel);
    gsap.to({ v: 0 }, {
      v: c.target, duration: 1.0, delay: c.delay, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = c.dec ? v.toFixed(c.dec) : Math.round(v).toLocaleString();
      }
    });
  });

  document.querySelectorAll('.tNum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 0.9, delay: 2.8 + i * 0.04, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = Math.round(this.targets()[0].v).toLocaleString();
      }
    });
  });

  // ============ PERPETUAL: Scan line sweep across entire viewport ============
  gsap.to('#scanLine', {
    x: 1400, duration: 6, repeat: -1, ease: 'none', delay: 1.2
  });

  // ============ PERPETUAL: Live dot pulse ============
  gsap.to('#liveDot', {
    attr: { r: 6 }, duration: 0.9, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: KPI borders breath ============
  gsap.to('.kpi-border', {
    strokeOpacity: 0.9, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.1, delay: 3.4
  });

  // ============ PERPETUAL: MRR last point pulse ============
  gsap.to('#mrrLast', {
    attr: { r: 7 }, duration: 1.2, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: Hourly bar tip flicker on peak (19th bar) ============
  // Simulate real-time data update: every 2s, slightly wobble the last few bars
  setInterval(() => {
    const bars = document.querySelectorAll('.abar');
    const lastFew = Array.from(bars).slice(-4);
    lastFew.forEach(b => {
      const currentH = parseFloat(b.dataset.h);
      const newH = currentH + (Math.random() - 0.5) * 4;
      gsap.to(b, { attr: { y: 70 - newH, height: newH }, duration: 0.4, ease: 'power1.out' });
    });
  }, 2200);

  // ============ PERPETUAL: System dot (footer) pulse ============
  gsap.to('.sysDot', {
    opacity: 0.4, duration: 1.1, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: Events counter ticking ============
  let evt = 847;
  setInterval(() => {
    evt += Math.floor(Math.random() * 12) + 1;
    document.getElementById('evtCounter').textContent = evt.toLocaleString();
  }, 1800);

  // ============ PERPETUAL: UTC clock ============
  function updClock() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2, '0');
    const m = String(now.getUTCMinutes()).padStart(2, '0');
    const s = String(now.getUTCSeconds()).padStart(2, '0');
    document.getElementById('timeUTC').textContent = `${h}:${m}:${s}`;
  }
  updClock();
  setInterval(updClock, 1000);

  // ============ PERPETUAL: Health dots blink ============
  gsap.to('.hp-dot', {
    opacity: 0.5, duration: 1.3, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.6
  });

  // ============ PERPETUAL: Top row (first data row) subtle highlight breath ============
  gsap.to('.tr[data-i="0"] rect', {
    fillOpacity: 0.08, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.8
  });

  // ============ PERPETUAL: Warning row (row 4) red pulse ============
  gsap.to('.tr[data-i="3"] rect', {
    fillOpacity: 0.12, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.0
  });
})();
</script></body></html>
