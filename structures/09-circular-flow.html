    const centers = [[380,220],[545,315],[545,505],[380,600],[215,505],[215,315]];
    const [cx, cy] = centers[i];
    tl.fromTo(s, { opacity: 0, scale: 0.4, transformOrigin: `${cx}px ${cy}px` }, { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(1.8)' }, 1.2 + i * 0.15);
  });

  // Connection arcs draw-on
  tl.to('.arcSeg', { strokeDashoffset: 0, duration: 0.6, stagger: 0.12, ease: 'power2.out' }, 1.5);

  // Right panel fade in (transform="translate(770, 120)" already positions it — only animate opacity)
  tl.to('#rightPanel', { opacity: 1, duration: 0.6 }, 2.0);

  // Phase bar
  tl.to('#phaseBar', { attr: { width: 417 }, duration: 1.4, ease: 'power2.out' }, 2.3);  // 75%

  // Sub-tasks cascade (each has its own transform="translate(0, Y)" — only fade in)
  tl.to('.sub-task', { opacity: 1, duration: 0.35, stagger: 0.08, ease: 'power2.out' }, 2.4);

  // Metrics + legend
  tl.to('#legend', { opacity: 1, duration: 0.5 }, 3.2);

  // Counters
  gsap.to({ v: 0 }, {
    v: 75, duration: 1.4, delay: 2.3, ease: 'power2.out',
    onUpdate: function () {
      document.getElementById('phaseProg').textContent = Math.round(this.targets()[0].v);
    }
  });
  document.querySelectorAll('.metric').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.1, delay: 3.0 + i * 0.1, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = Math.round(this.targets()[0].v);
      }
    });
  });

  // ============ PERPETUAL: Particles along orbit (path-based, 3 colors) ============
  const orbitPath = document.getElementById('orbitPath');
  const orbitLen = orbitPath.getTotalLength();
  const opG = document.getElementById('orbitParticles');
  const orbitParts = [];
  const colors = ['#c4a35a', '#5dade2', '#3daa5a'];
  for (let i = 0; i < 9; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', 2.8);
    c.setAttribute('fill', colors[i % 3]);
    c.setAttribute('opacity', 0);
    c.setAttribute('filter', 'url(#glow)');
    opG.appendChild(c);
    orbitParts.push({ el: c, phase: i / 9, speed: 0.0018 + (i % 3) * 0.0004 });
  }
  function orbitTick() {
    orbitParts.forEach(p => {
      p.phase = (p.phase + p.speed) % 1;
      const pt = orbitPath.getPointAtLength(p.phase * orbitLen);
      p.el.setAttribute('cx', pt.x);
      p.el.setAttribute('cy', pt.y);
      p.el.setAttribute('opacity', 0.75);
    });
    requestAnimationFrame(orbitTick);
  }
  setTimeout(orbitTick, 2000);

  // ============ PERPETUAL: Stage rings breathing ============
  gsap.to('.stage:not(.stage-current) .stageRing', {
    strokeWidth: 2.2, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.8
  });

  // ============ PERPETUAL: Current stage pulse (ring around it) ============
  gsap.to('#currentRing', {
    attr: { r: 48 }, opacity: 0.1, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: Current stage strong breath ============
  gsap.to('.stage-current .stageRing', {
    strokeWidth: 3, duration: 1.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5
  });

  // ============ PERPETUAL: Active sub-task dot pulse ============
  gsap.to('.activeDot', {
    attr: { r: 7 }, duration: 1.3, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });
  gsap.to('.activeDotInner', {
    attr: { r: 3 }, duration: 1.3, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: Center core subtle breath ============
  gsap.to('#center circle:first-of-type', {
    strokeOpacity: 0.7, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.6
  });

  // ============ PERPETUAL: Arc segments flow highlight (golden wave moving around) ============
  // Cycle highlight: each arc segment takes turns being brighter
  let hlIdx = 0;
  const arcs = document.querySelectorAll('.arcSeg');
  function arcHighlight() {
    arcs.forEach((a, i) => {
      gsap.to(a, {
        strokeOpacity: i === hlIdx ? 1 : 0.45,
        strokeWidth: i === hlIdx ? 2.4 : 1.6,
        duration: 0.5, ease: 'power2.out'
      });
    });
    hlIdx = (hlIdx + 1) % arcs.length;
  }
  setInterval(arcHighlight, 900);
  setTimeout(arcHighlight, 3000);
})();
</script></body></html>
