<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Frame
  tl.to('#frame', { opacity: 1, duration: 0.6 }, 0.8);

  // Layer labels
  tl.to('.layer-label', { opacity: 1, duration: 0.4, stagger: 0.1 }, 1.2);

  // Modules cascade by layer
  tl.to('.mod', { opacity: 1, duration: 0.35, stagger: { each: 0.04, from: 'start' }, ease: 'power2.out' }, 1.6);

  // Side panel
  tl.to('.mod-side', { opacity: 1, duration: 0.5 }, 2.6);

  // Bottom metrics
  tl.to('#metricsStrip', { opacity: 1, duration: 0.5 }, 3.0);

  // ============ PERPETUAL: Scan line sweeping down ============
  const scan = document.getElementById('scanLine');
  let scanY = 110;
  function scanTick() {
    scanY += 1.6;
    if (scanY > 700) scanY = 110;
    scan.setAttribute('y1', scanY);
    scan.setAttribute('y2', scanY);
    const inZone = scanY > 120 && scanY < 690 ? 0.35 : 0;
    scan.setAttribute('opacity', inZone);
    requestAnimationFrame(scanTick);
  }
  setTimeout(scanTick, 3200);

  // ============ PERPETUAL: Module border breath ============
  gsap.to('.mb', {
    strokeOpacity: 0.95, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.05, delay: 3.5
  });

  // ============ PERPETUAL: Inter-layer data flow particles ============
  // Each flow goes from M(i) bottom to M(i) top of next layer
  const flowGroup = document.createElementNS(ns, 'g');
  flowGroup.style.pointerEvents = 'none';
  document.getElementById('svg').appendChild(flowGroup);

  const flows = [];
  // 4 modules per layer, 3 inter-layer gaps → 12 flow columns
  for (let col = 0; col < 4; col++) {
    const x = 270 + col * 280;  // module centers: 140+130=270, 420+130=550, 700+130=830, 980+130=1110
    // Layer 1→2 (y 246→256), 2→3 (y 372→382), 3→4 (y 498→508)
    [[246, 256], [372, 382], [498, 508]].forEach(([y0, y1]) => {
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('r', 1.8);
      c.setAttribute('fill', '#c4a35a');
      c.setAttribute('opacity', 0);
      c.setAttribute('filter', 'url(#glow)');
      flowGroup.appendChild(c);
      flows.push({ el: c, x, y0, y1, phase: Math.random(), speed: 0.012 + Math.random() * 0.008 });
    });
  }
  function flowTick() {
    flows.forEach(f => {
      f.phase += f.speed;
      if (f.phase > 1) f.phase = 0;
      const y = f.y0 + (f.y1 - f.y0) * f.phase;
      f.el.setAttribute('cx', f.x);
      f.el.setAttribute('cy', y);
      f.el.setAttribute('opacity', 0.9);
    });
    requestAnimationFrame(flowTick);
  }
  setTimeout(flowTick, 3800);
})();
</script></body></html>
