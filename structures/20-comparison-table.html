  // Winner cells (row index → x, color):
  // Col boundaries: Claude x=280-640 (w=360), GPT x=640-1000 (w=360), Gemini x=1000-1360 (w=360)
  const winners = [
    { x: 1000, y: 220, w: 360, color: '#5dade2' },  // row 0 Gemini context
    { x: 280,  y: 270, w: 360, color: '#c4a35a' },  // row 1 Claude output
    { x: 1000, y: 320, w: 360, color: '#5dade2' },  // row 2 Gemini input price
    { x: 1000, y: 370, w: 360, color: '#5dade2' },  // row 3 Gemini output price
    { x: 1000, y: 420, w: 360, color: '#5dade2' },  // row 4 Gemini multimodal
    { x: 280,  y: 470, w: 360, color: '#c4a35a' },  // row 5 Claude SWE
    { x: 640,  y: 520, w: 360, color: '#3daa5a' },  // row 6 GPT MMLU
    { x: 280,  y: 570, w: 360, color: '#c4a35a' },  // row 7 Claude release
  ];
  const ns = 'http://www.w3.org/2000/svg';
  const highlightG = document.createElementNS(ns, 'g');
  highlightG.style.pointerEvents = 'none';
  document.getElementById('svg').appendChild(highlightG);

  let curWin = 0;
  function pulseWinner() {
    const w = winners[curWin];
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', w.x); r.setAttribute('y', w.y);
    r.setAttribute('width', w.w); r.setAttribute('height', 50);
    r.setAttribute('fill', 'none');
    r.setAttribute('stroke', w.color);
    r.setAttribute('stroke-width', 1.4);
    r.setAttribute('opacity', 0);
    r.setAttribute('filter', 'url(#softGlow)');
    highlightG.appendChild(r);
    gsap.to(r, { opacity: 0.9, duration: 0.3, ease: 'power2.out' });
    gsap.to(r, { opacity: 0, duration: 0.9, delay: 0.8, ease: 'power2.in', onComplete: () => r.remove() });
    curWin = (curWin + 1) % winners.length;
  }
  setInterval(pulseWinner, 1000);

  // ============ PERPETUAL: Claude column breathing border ============
  gsap.to('.col-head[data-i="0"]', { strokeWidth: 1.8, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5 });

  // ============ PERPETUAL: Scan line across row zone ============
  const scan = document.createElementNS(ns, 'line');
  scan.setAttribute('x1', 40); scan.setAttribute('x2', 1360);
  scan.setAttribute('stroke', '#c4a35a'); scan.setAttribute('stroke-width', 0.8); scan.setAttribute('opacity', 0.25);
  scan.setAttribute('filter', 'url(#glow)');
  document.getElementById('svg').appendChild(scan);
  let sy = 220;
  function scanTick() {
    sy += 2.2;
    if (sy > 620) sy = 220;
    scan.setAttribute('y1', sy); scan.setAttribute('y2', sy);
    requestAnimationFrame(scanTick);
  }
  setTimeout(scanTick, 3500);
})();
</script></body></html>
