</svg></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Root appears first
  tl.to('#root', { opacity: 1, duration: 0.5 }, 0.8);

  // L1 branches draw on
  tl.to('.branch-l1', { strokeDashoffset: 0, duration: 0.7, stagger: 0.08, ease: 'power2.out' }, 1.1);

  // L1 nodes appear after their branches
  tl.to('.l1', { opacity: 1, duration: 0.5, stagger: 0.1 }, 1.4);

  // L2 branches draw on
  tl.to('.branch-l2', { strokeDashoffset: 0, duration: 0.5, stagger: 0.04, ease: 'power2.out' }, 1.8);

  // L2 nodes cascade
  tl.to('.l2', { opacity: 1, duration: 0.4, stagger: 0.05, ease: 'power2.out' }, 2.0);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 2.8);

  // ============ PERPETUAL: Flow particles (root → L1 → L2, following branches) ============
  const l1Paths = document.querySelectorAll('.branch-l1');
  const l2Paths = document.querySelectorAll('.branch-l2');
  const allPaths = [...l1Paths, ...l2Paths];
  const fpG = document.getElementById('flowParticles');
  const colors = { 0: '#c4a35a', 1: '#5dade2', 2: '#3daa5a', 3: '#f4845f' };

  const particles = [];
  allPaths.forEach((path, idx) => {
    const isL2 = path.classList.contains('branch-l2');
    const category = parseInt(isL2 ? path.dataset.p : path.dataset.i);
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', isL2 ? 2 : 2.6);
    c.setAttribute('fill', colors[category]);
    c.setAttribute('opacity', 0);
    c.setAttribute('filter', 'url(#glow)');
    fpG.appendChild(c);
    particles.push({ el: c, path, length: path.getTotalLength(), phase: Math.random(), speed: isL2 ? 0.008 : 0.006 });
  });

  function tick() {
    particles.forEach(p => {
      p.phase = (p.phase + p.speed) % 1;
      const pt = p.path.getPointAtLength(p.phase * p.length);
      p.el.setAttribute('cx', pt.x);
      p.el.setAttribute('cy', pt.y);
      const d = Math.min(p.phase, 1 - p.phase) * 2;
      p.el.setAttribute('opacity', Math.min(d * 1.2, 0.8));
    });
    requestAnimationFrame(tick);
  }
  setTimeout(tick, 2800);

  // ============ PERPETUAL: L1 border breath ============
  gsap.to('.l1-border', {
    strokeOpacity: 1, strokeWidth: 1.6, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.2
  });

  // ============ PERPETUAL: L2 border breath (subtle) ============
  gsap.to('.l2-border', {
    strokeOpacity: 0.85, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.08, delay: 3.6
  });

  // ============ PERPETUAL: Branch stroke pulse ============
  gsap.to('.branch-l1', {
    strokeOpacity: 0.4, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.15, delay: 4
  });
})();
</script></body></html>
