</g>

  <text x="700" y="385" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#0a0a0b">3</text>
  <rect x="770" y="310" width="240" height="100" rx="3" fill="#0a141c" fill-opacity="0.85" stroke="#5dade2" stroke-width="1.2" stroke-opacity="0.85" class="ms-card" filter="url(#glow)"/>
  <text x="782" y="330" font-family="JetBrains Mono" font-size="9" fill="#5dade2" letter-spacing="2">M3 · MONTH 9 · ● CURRENT</text>
  <text x="782" y="352" font-family="Noto Serif SC" font-size="14" font-weight="700" fill="#5dade2">灰度上线</text>

  <circle cx="900" cy="580" r="10" fill="#0a0a0b" stroke="#3daa5a" stroke-width="2.4" class="ms-dot" stroke-dasharray="3,3"/>

  <rect x="800" y="640" width="210" height="58" rx="3" fill="#0a1a10" fill-opacity="0.6" stroke="#3daa5a" stroke-width="0.6" stroke-opacity="0.55" stroke-dasharray="4,4" class="ms-card"/>
  <text x="812" y="658" font-family="JetBrains Mono" font-size="9" fill="#3daa5a" letter-spacing="2">M4 · MONTH 12 · FUTURE</text>
  <text x="1000" y="658" text-anchor="end" font-family="JetBrains Mono" font-size="9" fill="#3daa5a" opacity="0.7">ETA 2026-Q1</text>
  <text x="812" y="676" font-family="Noto Serif SC" font-size="13" font-weight="700" fill="#e8e4df" opacity="0.85">规模化</text>
  <text x="812" y="692" font-family="Noto Serif SC" font-size="10" fill="#8a8578">100% 用户 · 全部 workflow</text>
</g>

<!-- M5 (18月, 1320,280) — 能力沉淀 · box ABOVE (y=80-230) -->

  <circle cx="1320" cy="280" r="10" fill="#0a0a0b" stroke="#bb8fce" stroke-width="2.4" class="ms-dot" stroke-dasharray="3,3"/>

  <rect x="1170" y="110" width="210" height="120" rx="3" fill="#140a1a" fill-opacity="0.6" stroke="#bb8fce" stroke-width="0.6" stroke-opacity="0.55" stroke-dasharray="4,4" class="ms-card"/>
  <text x="1182" y="130" font-family="JetBrains Mono" font-size="9" fill="#bb8fce" letter-spacing="2">M5 · MONTH 18 · VISION</text>
  <text x="1182" y="150" font-family="Noto Serif SC" font-size="13" font-weight="700" fill="#e8e4df" opacity="0.85">能力沉淀</text>
  <text x="1182" y="168" font-family="Noto Serif SC" font-size="10" fill="#8a8578">AI 原生组织 · 模块化复用</text>
  <text x="1182" y="186" font-family="Noto Serif SC" font-size="10" fill="#8a8578">内部平台 · 知识资产</text>
  <text x="1182" y="204" font-family="Noto Serif SC" font-size="10" fill="#8a8578">自研模型 · 数据飞轮</text>

<!-- Traveler dot (perpetual, sliding along path from start to end) -->
<circle id="traveler" r="5" fill="#c4a35a" opacity="0" filter="url(#glow)"/>

<!-- Progress indicator strip (bottom) — moved x=260 so doesn't overlap M0 card (x=20-238) -->
<g id="progressStrip" opacity="0" transform="translate(260, 728)">

  <line x1="300" y1="-3" x2="940" y2="-3" stroke="#1a1a1a" stroke-width="8"/>
  <line id="progBar" x1="300" y1="-3" x2="300" y2="-3" stroke="#c4a35a" stroke-width="8" stroke-linecap="round"/>
  <text x="960" y="0" font-family="Space Grotesk" font-size="14" font-weight="700" fill="#c4a35a"><tspan id="progPct">0</tspan>%</text>
  <text x="1030" y="0" font-family="JetBrains Mono" font-size="10" fill="#8a8578">ETA 2026-Q3</text>
</g>

<text x="30" y="768" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.3" letter-spacing="2">STR-ROADMAP-15 / REV.B — IMPECCABLE</text>
<text x="1370" y="768" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#c4a35a" opacity="0.3" letter-spacing="2">ASYRE JOURNEY</text>

</svg></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const road = document.getElementById('road');
  const roadLen = road.getTotalLength();

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Road edge guide
  tl.to('#roadEdge', { opacity: 0.3, duration: 0.5 }, 0.6);

  // Road draw on
  tl.to('#road', { strokeDashoffset: 0, duration: 2.4, ease: 'power1.inOut' }, 0.8);

  // Milestones appear sequentially as road passes them
  tl.to('.ms', { opacity: 1, duration: 0.5, stagger: 0.35, ease: 'power2.out' }, 1.0);

  // Progress bar (current = 50% = at x = 400 + 350 = 750)
  tl.to('#progBar', { attr: { x2: 620 }, duration: 1.4, ease: 'power2.out' }, 2.8);  // 50% of 640 bar width = 320 offset from x1=300
  tl.to('#progressStrip', { opacity: 1, duration: 0.5 }, 2.6);

  // Progress counter M3 phase
  gsap.to({ v: 0 }, {
    v: 50, duration: 1.4, delay: 3.0, ease: 'power2.out',
    onUpdate: function () {
      document.getElementById('progPct').textContent = Math.round(this.targets()[0].v);
    }
  });

  // Current phase detail counter (M3 progress within phase)
  gsap.to({ v: 0 }, {
    v: 65, duration: 1.2, delay: 2.4, ease: 'power2.out',
    onUpdate: function () {
      document.getElementById('prog').textContent = Math.round(this.targets()[0].v);
    }
  });

  // ============ PERPETUAL: Traveler dot sliding along road ============
  gsap.to('#traveler', { opacity: 1, duration: 0.4, delay: 3.2 });
  let tphase = 0;
  function travelerTick() {
    tphase = (tphase + 0.002) % 1;
    const pt = road.getPointAtLength(tphase * roadLen);
    document.getElementById('traveler').setAttribute('cx', pt.x);
    document.getElementById('traveler').setAttribute('cy', pt.y);
    requestAnimationFrame(travelerTick);
  }
  setTimeout(travelerTick, 3200);

  // ============ PERPETUAL: Current milestone (M3) pulse ============
  gsap.to('#currentPulse', {
    attr: { r: 26 }, opacity: 0.05, duration: 1.6, repeat: -1, yoyo: false, ease: 'power1.out',
    onRepeat: function () {
      gsap.set('#currentPulse', { attr: { r: 14 }, opacity: 0.5 });
    }
  });

  // ============ PERPETUAL: Completed milestone (M0-M2) gentle breath ============
  gsap.utils.toArray('.ms').forEach((ms, i) => {
    if (i < 3) {  // M0, M1, M2 completed
      const dot = ms.querySelector('.ms-dot');
      gsap.to(dot, { strokeWidth: 3, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.8 + i * 0.3 });
    }
  });

  // ============ PERPETUAL: Future milestone (M4, M5) dashed border rotate (visually subtle) ============
  gsap.utils.toArray('.ms').forEach((ms, i) => {
    if (i >= 4) {
      const card = ms.querySelector('.ms-card');
      gsap.to(card, { strokeOpacity: 0.85, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.2 + (i - 4) * 0.3 });
    }
  });

  // ============ PERPETUAL: Current card extra glow ============
  gsap.to('.ms-current .ms-card', {
    strokeWidth: 1.6, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4
  });

  // ============ PERPETUAL: Road gradient animation (subtle color flow) ============
  // Non-essential, skip for now
})();
</script></body></html>
