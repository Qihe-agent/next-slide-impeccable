<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';

  // Corner ring perpetual
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // ============ ENTRANCE ============
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Left tower header + cards cascade
  tl.to('.left-header', { opacity: 1, x: 0, duration: 0.5 }, 0.8);
  tl.to('.left-card', { opacity: 1, x: 0, duration: 0.45, stagger: 0.1, ease: 'power2.out' }, 1.0);
  tl.to('.left-footer', { opacity: 1, duration: 0.4 }, 1.6);

  // Bridge arc draw-on
  tl.to('#bridgeArc', { opacity: 1, strokeDashoffset: 0, duration: 1.2, ease: 'power2.inOut' }, 1.7);
  tl.to('#bridgeShadow', { opacity: 0.4, duration: 0.6 }, 2.2);

  tl.to('#arcCaption', { opacity: 1, duration: 0.5 }, 2.6);

  // Stones pop in sequentially with back-ease
  gsap.utils.toArray('.stone').forEach((s, i) => {
    const cx = [520, 700, 880][i];
    const cy = [320, 300, 320][i];
    tl.fromTo(s, { opacity: 0, scale: 0.3, transformOrigin: `${cx}px ${cy}px` }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(2.2)' }, 2.5 + i * 0.2);
  });

  // Right tower (after bridge completes)
  tl.to('.right-header', { opacity: 1, x: 0, duration: 0.5 }, 3.1);
  tl.to('.right-card', { opacity: 1, x: 0, duration: 0.45, stagger: 0.1, ease: 'power2.out' }, 3.3);
  tl.to('.right-footer', { opacity: 1, duration: 0.4 }, 3.9);

  // Bottom progress block
  tl.to('#progressBlock', { opacity: 1, duration: 0.6 }, 4.0);
  tl.to('#progressBar', { attr: { width: 280 }, duration: 1.2, ease: 'power2.out' }, 4.2);  // 40% of 700

  // Counters
  document.querySelectorAll('.lNum, .rNum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    const isLeft = el.classList.contains('lNum');
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: (isLeft ? 1.3 : 3.5) + i * 0.08, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = Number.isInteger(target) ? Math.round(v) : v.toFixed(1);
      }
    });
  });

  // Progress counter
  gsap.to({ v: 0 }, {
    v: 40, duration: 1.2, delay: 4.3, ease: 'power2.out',
    onUpdate: function () {
      document.getElementById('progNum').textContent = Math.round(this.targets()[0].v);
    }
  });

  // ============ PERPETUAL: Arc particles (flow left → right along bridge) ============
  const arc = document.getElementById('bridgeArc');
  const arcLen = arc.getTotalLength();
  const pg = document.getElementById('arcParticles');
  const PARTICLES = 6;
  const parts = [];
  for (let i = 0; i < PARTICLES; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', 3);
    c.setAttribute('fill', '#c4a35a');
    c.setAttribute('opacity', 0);
    c.setAttribute('filter', 'url(#glow)');
    pg.appendChild(c);
    parts.push({ el: c, phase: i / PARTICLES, speed: 0.0028 });
  }
  function arcTick() {
    parts.forEach(p => {
      p.phase = (p.phase + p.speed) % 1;
      const pt = arc.getPointAtLength(p.phase * arcLen);
      p.el.setAttribute('cx', pt.x);
      p.el.setAttribute('cy', pt.y);
      const d = Math.min(p.phase, 1 - p.phase) * 2;
      p.el.setAttribute('opacity', Math.min(d * 1.3, 0.85));
    });
    requestAnimationFrame(arcTick);
  }
  setTimeout(arcTick, 2500);

  // ============ PERPETUAL: Left cards red warning breath ============
  gsap.to('.left-card-rect', {
    strokeOpacity: 0.95, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.12, delay: 4.5
  });

  // ============ PERPETUAL: Right cards gold/green positive breath ============
  gsap.to('.right-card-rect', {
    strokeOpacity: 0.95, strokeWidth: 1.2, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.12, delay: 4.8
  });

  // ============ PERPETUAL: Stones pulse sequentially ============
  gsap.utils.toArray('.stone circle').forEach((c, i) => {
    gsap.to(c, {
      attr: { r: i === 1 ? 25 : 21 },
      duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 5 + i * 0.4
    });
  });

  // ============ PERPETUAL: Peak stone extra glow ============
  gsap.to('.stone-peak circle', {
    strokeWidth: 3, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 5.2
  });
})();
</script></body></html>
