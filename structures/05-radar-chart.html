<!-- Back layer · Swept-sector trail: dynamic fan from center to recent history arc on hex.
     Represents "the area just scanned" — dashed cool-blue fan filling inside the hex.
     d is rebuilt each frame from (center) + 18 samples along the last TRAIL_LEN units of perimeter.
     Opacity boosted: fill 0.10→0.22, stroke 0.45→0.8 — the data polygons partially occlude the
     trail fan, so we need ≥0.2 fill-opacity for the blue to read through on black bg. -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  // Corner ring
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

  // Header
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3')
    .to('.titleLine', { opacity: 0.4, duration: 0.4 }, '-=0.3');

  // Radar: rings draw-on (expanding outward)
  tl.to('.ring', { opacity: 0.6, duration: 0.4, stagger: 0.1, ease: 'power2.out' }, 0.8);
  tl.to('.rLabel', { opacity: 0.7, duration: 0.4, stagger: 0.06 }, 0.9);

  // Axes
  tl.to('.axis', { opacity: 0.4, duration: 0.4, stagger: 0.05 }, 1.1);

  // Axis labels
  tl.to('.aLabel', { opacity: 1, duration: 0.4, stagger: 0.06 }, 1.3);

  // Hex-scan glow + swept-sector trail + beam fade in (back to front)
  tl.to('#sweepTrail', { opacity: 1, duration: 0.6 }, 1.4);
  tl.to('#hexScan', { opacity: 1, duration: 0.5 }, 1.5);
  tl.to('#sweepBeam', { opacity: 1, duration: 0.4 }, 1.5);

  // Data polygons stagger draw-on (opacity + stroke appear, fade to fill)
  tl.to('#polyGPT', { opacity: 1, strokeOpacity: 1, duration: 0.7, ease: 'power2.out' }, 1.8);
  tl.to('#polyGemini', { opacity: 1, strokeOpacity: 1, duration: 0.7, ease: 'power2.out' }, 2.0);
  tl.to('#polyClaude', { opacity: 1, strokeOpacity: 1, duration: 0.8, ease: 'power2.out' }, 2.2);

  // Data dots pop
  tl.to('.dot-gpt', { opacity: 0.8, duration: 0.3, stagger: 0.04 }, 2.0);
  tl.to('.dot-gem', { opacity: 0.8, duration: 0.3, stagger: 0.04 }, 2.2);
  tl.to('.dot-clau', { opacity: 1, scale: 1, duration: 0.4, stagger: 0.05, ease: 'back.out(2)' }, 2.4);

  // Legend
  tl.to('#legend', { opacity: 1, duration: 0.5 }, 2.8);

  // Right panel: overall scores cards.
  // BUG-FIX: must NOT set y: 0 in the tween — GSAP would clobber the static
  // transform="translate(X, 480)" y-component, dropping cards to y=0 (top of canvas).
  // Only tween opacity; static translate stays intact.
  tl.to('.score-card', { opacity: 1, duration: 0.5, stagger: 0.15, ease: 'power2.out' }, 1.0);

  // Breakdown rows
  tl.to('.brk-row', { opacity: 1, x: 0, duration: 0.4, stagger: 0.1, ease: 'power2.out' }, 2.0);

  // Breakdown bars grow
  tl.to('.brk-bar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.7,
    stagger: 0.04,
    ease: 'power2.out'
  }, 2.2);

  // Verdict
  tl.to('#verdict', { opacity: 1, duration: 0.6 }, 3.2);

  // Overall score counters
  [
    { sel: '#avg_gpt', target: 86, delay: 1.2 },
    { sel: '#avg_clau', target: 88, delay: 1.4 },
    { sel: '#avg_gem', target: 86, delay: 1.6 }
  ].forEach(c => {
    gsap.to({ v: 0 }, {
      v: c.target, duration: 1.1, delay: c.delay, ease: 'power2.out',
      onUpdate: function () {
        document.querySelector(c.sel).textContent = Math.round(this.targets()[0].v);
      }
    });
  });

  // ============ PERPETUAL: Hex-perimeter scan (3 layers, cold-blue palette) ============
  // LAYER 1 (back)  · sweepTrail : 30°-wide fan from center to hex edge between beamA and beamB
  // LAYER 2 (mid)   · hexScan    : 100-unit bright segment walking along hex edges
  // LAYER 3 (front) · sweepBeam  : beamA (gold, head) + beamB (blue dashed, tail)
  // Per user request: two beams form an EXACT 30° angle at center (not perimeter-distance-based).
  // Head walks hex perimeter at scanDist; tail is computed by ray-casting at head_angle - 30°.
  const hexScanEl = document.getElementById('hexScan');
  const trailEl = document.getElementById('sweepTrail');
  const beamA = document.getElementById('beamA');
  const beamB = document.getElementById('beamB');
  const CX = 470, CY = 430;
  const hexVerts = [
    [470, 230], [643, 330], [643, 530],
    [470, 630], [297, 530], [297, 330]
  ];
  const PERIM = 1200;                        // hex perimeter (6 edges × side 200)
  const scanSpeed = PERIM / (16 * 60);       // 16s per full loop @ ~60fps
  const FAN_ANGLE = Math.PI / 6;             // 30° fan between head and tail beams
  const FAN_SAMPLES = 20;                    // resolution of the fan polygon (higher = smoother edge)
  const SCAN_BRIGHT = 100;                   // hex-scan bright-segment length (~30° on perimeter)
  let scanDist = 0;

  // Position on hex perimeter at arc-length d (used to drive the head beam)
  function posAtPerim(d) {
    d = ((d % PERIM) + PERIM) % PERIM;
    const i = Math.floor(d / 200) % 6;
    const t = (d - i * 200) / 200;
    const v1 = hexVerts[i];
    const v2 = hexVerts[(i + 1) % 6];
    return [v1[0] + (v2[0] - v1[0]) * t, v1[1] + (v2[1] - v1[1]) * t];
  }

  // Cast a ray from (CX, CY) at `angle`, return intersection with the hex perimeter.
  // Returns { x, y, edge, s } — we need edge+s so callers can compute the point's
  // arc-length along the perimeter (= edge·200 + s·200). This is critical for keeping
  // the hex-perimeter bright segment (hexScan) in sync with the two beams.
  function rayToHex(angle) {
    const dx = Math.cos(angle), dy = Math.sin(angle);
    let minT = Infinity, best = { x: CX, y: CY, edge: 0, s: 0 };
    for (let i = 0; i < 6; i++) {
      const v1 = hexVerts[i];
      const v2 = hexVerts[(i + 1) % 6];
      const ex = v2[0] - v1[0], ey = v2[1] - v1[1];  // e = edge direction
      const vx = v1[0] - CX, vy = v1[1] - CY;         // V = center → edge-start
      const dxe = dx * ey - dy * ex;                  // d × e (denominator)
      if (Math.abs(dxe) < 1e-9) continue;             // ray parallel to edge
      const t = (vx * ey - vy * ex) / dxe;            // V × e / (d × e)
      const s = (vx * dy - vy * dx) / dxe;            // V × d / (d × e)
      if (t > 0 && s >= -1e-6 && s <= 1 + 1e-6 && t < minT) {
        minT = t;
        best = { x: CX + t * dx, y: CY + t * dy, edge: i, s: Math.max(0, Math.min(1, s)) };
      }
    }
    return best;
  }

  function scanTick() {
    scanDist = (scanDist + scanSpeed) % PERIM;
    // Head (front gold beam): walks hex perimeter at scanDist
    const [hx, hy] = posAtPerim(scanDist);
    const headAngle = Math.atan2(hy - CY, hx - CX);
    // Tail (back blue dashed beam): exactly 30° behind head
    const tailAngle = headAngle - FAN_ANGLE;
    const tailHit = rayToHex(tailAngle);
    const tx = tailHit.x, ty = tailHit.y;
    // Tail's arc-length along hex perimeter (for syncing hex-scan bright segment)
    const tailDist = tailHit.edge * 200 + tailHit.s * 200;
    beamA.setAttribute('x2', hx.toFixed(1));
    beamA.setAttribute('y2', hy.toFixed(1));
    beamB.setAttribute('x2', tx.toFixed(1));
    beamB.setAttribute('y2', ty.toFixed(1));
    // Rebuild the 30° fan polygon: center + samples on hex edge at angles [head, tail]
    let d = 'M ' + CX + ',' + CY;
    for (let i = 0; i <= FAN_SAMPLES; i++) {
      const ang = headAngle - FAN_ANGLE * (i / FAN_SAMPLES);
      const hit = rayToHex(ang);
      d += ' L ' + hit.x.toFixed(1) + ',' + hit.y.toFixed(1);
    }
    d += ' Z';
    trailEl.setAttribute('d', d);
    // Hex-perimeter bright segment: span EXACTLY from tail-arc-length to head-arc-length
    // so the two beams' endpoints align with the ends of the bright edge glow.
    const brightLen = (scanDist - tailDist + PERIM) % PERIM;
    hexScanEl.setAttribute('stroke-dasharray', brightLen.toFixed(1) + ' ' + (PERIM - brightLen).toFixed(1));
    hexScanEl.setAttribute('stroke-dashoffset', (-tailDist).toFixed(1));
    requestAnimationFrame(scanTick);
  }
  scanTick();

  // ============ PERPETUAL: Claude dots pulse (winner highlight) ============
  gsap.to('.dot-clau', {
    attr: { r: 5.5 }, duration: 1.5, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.2
  });

  // ============ PERPETUAL: Winner card border breath ============
  gsap.to('.score-winner rect:first-child', {
    strokeWidth: 2.2, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5
  });

  // ============ PERPETUAL: Claude polygon subtle breathing ============
  gsap.to('#polyClaude', {
    opacity: 0.85, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.8
  });

  // ============ PERPETUAL: Axis labels tick highlight ============
  gsap.utils.toArray('.aLabel').forEach((el, i) => {
    gsap.to(el, {
      fill: '#c4a35a', duration: 1.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 + i * 0.5
    });
  });
})();
