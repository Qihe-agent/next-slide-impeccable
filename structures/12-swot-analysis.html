<script>
(() => {
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  tl.to('.axis-label', { opacity: 0.8, duration: 0.5, stagger: 0.12 }, 0.8);
  tl.to('#divV, #divH', { opacity: 0.4, duration: 0.6 }, 1.0);
  tl.to('#crossDot', { opacity: 1, duration: 0.3 }, 1.3);

  // Quadrants appear in diagonal order (S → T diagonal, W → O diagonal)
  tl.to('.q-s', { opacity: 1, duration: 0.5 }, 1.5);
  tl.to('.q-t', { opacity: 1, duration: 0.5 }, 1.55);
  tl.to('.q-w', { opacity: 1, duration: 0.5 }, 1.7);
  tl.to('.q-o', { opacity: 1, duration: 0.5 }, 1.75);

  // Bullets per-quadrant stagger (already inside quad, so opacity is inherited; add subtle emphasis)
  // Done via quad opacity

  // Counters
  document.querySelectorAll('.sNum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: 2.0 + i * 0.12, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = this.targets()[0].v.toFixed(1);
      }
    });
  });

  // Recommendation
  tl.to('#recommend', { opacity: 1, duration: 0.5 }, 2.5);

  // ============ PERPETUAL: Quadrant highlight cycle (every 1.6s one quadrant lights up) ============
  const quads = document.querySelectorAll('.quad-border');
  let q = 0;
  function cycleQuad() {
    quads.forEach((el, i) => {
      gsap.to(el, {
        strokeOpacity: i === q ? 1 : 0.5,
        strokeWidth: i === q ? 1.6 : 0.8,
        duration: 0.5, ease: 'power2.out'
      });
    });
    q = (q + 1) % quads.length;
  }
  setInterval(cycleQuad, 1600);
  setTimeout(cycleQuad, 3000);

  // ============ PERPETUAL: Cross dot breath ============
  gsap.to('#crossDot', {
    attr: { r: 7 }, opacity: 0.3, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut'
  });

  // ============ PERPETUAL: Bullet dots subtle pulse ============
  gsap.to('.bullet circle', {
    attr: { r: 4.5 }, duration: 1.4, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: { amount: 1.2, from: 'start' }, delay: 3.2
  });
})();
</script></body></html>
