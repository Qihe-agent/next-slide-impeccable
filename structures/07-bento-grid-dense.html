<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // Build hero 12-month bars (rising trend)
  const heroVals = [22, 28, 34, 38, 42, 48, 52, 58, 64, 70, 74, 80];
  const hbG = document.getElementById('heroBars');
  heroVals.forEach((v, i) => {
    const bw = 60;
    const gap = 10;
    const x = i * (bw + gap);
    const h = v * 2.2;
    const y = 192 - h;
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', 192);
    r.setAttribute('width', bw);
    r.setAttribute('height', 0);
    r.setAttribute('fill', i === 11 ? '#c4a35a' : '#c4a35a');
    r.setAttribute('fill-opacity', i === 11 ? 0.9 : (0.3 + i * 0.05));
    r.classList.add('heroBar');
    r.dataset.y = y;
    r.dataset.h = h;
    hbG.appendChild(r);
    // Month value label on top
    if (i === 11) {
      const lbl = document.createElementNS(ns, 'text');
      lbl.setAttribute('x', x + bw / 2);
      lbl.setAttribute('y', y - 5);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('font-family', 'JetBrains Mono');
      lbl.setAttribute('font-size', '9');
      lbl.setAttribute('font-weight', '600');
      lbl.setAttribute('fill', '#c4a35a');
      lbl.setAttribute('opacity', 0);
      lbl.classList.add('heroBarLbl');
      lbl.textContent = '80';
      hbG.appendChild(lbl);
    }
  });

  // Build KB 14 daily bars
  const kbVals = [32, 28, 35, 40, 38, 42, 45, 48, 52, 50, 55, 60, 58, 64];
  const kbG = document.getElementById('kbDailyBars');
  kbVals.forEach((v, i) => {
    const bw = 18;
    const gap = 3;
    const x = i * (bw + gap);
    const h = v * 0.7;
    const y = 56 - h;
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', 56);
    r.setAttribute('width', bw);
    r.setAttribute('height', 0);
    r.setAttribute('fill', '#c4a35a');
    r.setAttribute('fill-opacity', 0.3 + i * 0.04);
    r.classList.add('kbBar');
    r.dataset.y = y;
    r.dataset.h = h;
    kbG.appendChild(r);
  });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Bento cards fade in (each has transform="translate(X, Y)" — only animate opacity)
  tl.to('.bento', { opacity: 1, duration: 0.5, stagger: 0.12, ease: 'power2.out' }, 0.7);

  // Hero bars grow
  tl.to('.heroBar', {
    attr: { y: (i, el) => parseFloat(el.dataset.y), height: (i, el) => parseFloat(el.dataset.h) },
    duration: 0.9,
    stagger: 0.06,
    ease: 'power2.out'
  }, 1.6);
  tl.to('.heroBarLbl', { opacity: 1, duration: 0.4 }, 2.3);

  // Adoption bars
  tl.to('.adoptBar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.8,
    stagger: 0.08,
    ease: 'power2.out'
  }, 1.5);

  // Deploy sparkline
  tl.to('#deploySpark', { strokeDashoffset: 0, duration: 1.2, ease: 'power2.inOut' }, 1.8);
  tl.to('#deploySparkEnd', { opacity: 1, duration: 0.3 }, 2.8);

  // Task ring
  tl.to('#taskRing', { strokeDashoffset: 45, duration: 1.4, ease: 'power2.out' }, 1.9);

  // Error bars
  tl.to('.errBar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.7,
    ease: 'power2.out'
  }, 2.1);

  // NPS bars
  tl.to('.npsBar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.7,
    stagger: 0.1,
    ease: 'power2.out'
  }, 2.2);

  // KB bars
  tl.to('.kbBar', {
    attr: { y: (i, el) => parseFloat(el.dataset.y), height: (i, el) => parseFloat(el.dataset.h) },
    duration: 0.6,
    stagger: 0.04,
    ease: 'power2.out'
  }, 2.3);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 3.0);

  // Counters
  [
    { sel: '#hero_num', target: 4.8, dec: 1, delay: 1.2 },
    { sel: '#b_adopt', target: 78, dec: 0, delay: 1.4 },
    { sel: '#b_deploy', target: 14, dec: 0, delay: 1.8 },
    { sel: '#b_tasks', target: 2.4, dec: 1, delay: 1.9 },
    { sel: '#b_tasks_pct', target: 83, dec: 0, delay: 2.2 },
    { sel: '#b_err', target: 68, dec: 0, delay: 2.1 },
    { sel: '#b_nps', target: 72, dec: 0, delay: 2.3 },
    { sel: '#b_kb', target: 3.8, dec: 1, delay: 2.4 }
  ].forEach(c => {
    const el = document.querySelector(c.sel);
    gsap.to({ v: 0 }, {
      v: c.target, duration: 1.1, delay: c.delay, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = c.dec ? v.toFixed(c.dec) : Math.round(v);
      }
    });
  });

  // ============ PERPETUAL: Scan line ============
  gsap.to('#scanLine', { x: 1400, duration: 7, repeat: -1, ease: 'none', delay: 1.4 });

  // ============ PERPETUAL: Card borders breath (stagger) ============
  gsap.to('.card-border', {
    strokeOpacity: 0.95, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.12, delay: 3.5
  });

  // ============ PERPETUAL: Last hero bar (Dec, current) pulse ============
  gsap.utils.toArray('.heroBar').slice(-1).forEach(b => {
    gsap.to(b, { fillOpacity: 0.6, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 });
  });

  // ============ PERPETUAL: Deploy spark end point pulse ============
  gsap.to('#deploySparkEnd', {
    attr: { r: 5.2 }, duration: 1.3, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.2
  });

  // ============ PERPETUAL: Task ring breath ============
  gsap.to('#taskRing', {
    strokeWidth: 7.2, duration: 2, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.5
  });
})();
</script></body></html>
