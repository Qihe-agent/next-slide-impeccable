<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Panels appear in reading order with slight stagger
  tl.to('.panel', { opacity: 1, duration: 0.5, stagger: 0.18, ease: 'power2.out' }, 0.8);

  // ============ PERPETUAL: Progress bar movement in panel 02 ============
  const prog1 = document.querySelector('.pb-prog1');
  const prog2 = document.querySelector('.pb-prog2');
  const prog3 = document.querySelector('.pb-prog3');
  if (prog1 && prog2 && prog3) {
    gsap.to(prog1, { attr: { width: 350 }, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2.5 });
    gsap.to(prog2, { attr: { width: 260 }, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2.7 });
    gsap.to(prog3, { attr: { width: 180 }, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2.9 });
  }

  // ============ PERPETUAL: PANIC flash in panel 03 ============
  const panic = document.querySelector('.panic');
  if (panic) gsap.to(panic, { opacity: 0.4, duration: 0.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3 });

  // ============ PERPETUAL: SHIP IT pulse in panel 05 ============
  const shipit = document.querySelector('.shipit');
  if (shipit) gsap.to(shipit, { scale: 1.06, transformOrigin: 'center', duration: 0.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.2 });

  // ============ PERPETUAL: Heartbeat dot in panel 06 ============
  const heart = document.querySelector('.heartDot');
  if (heart) gsap.to(heart, { attr: { r: 7 }, opacity: 0.4, duration: 0.9, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2.8 });

  // ============ PERPETUAL: Panel border subtle breath ============
  gsap.to('.pb', { strokeWidth: (i, el) => el.classList.contains('pb') && el.parentElement?.getAttribute('data-i') === '4' ? 2.4 : 1.7, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.6 });

  // ============ PERPETUAL: Diagnostic dots orbit in panel 04 ============
  const panel4 = document.querySelectorAll('.panel')[3];
  if (panel4) {
    const dots = panel4.querySelectorAll('circle[r="3"]');
    dots.forEach((d, i) => {
      gsap.to(d, { opacity: 0.2, duration: 1.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3 + i * 0.3 });
    });
  }

  // ============ PERPETUAL: Boot ring pulse in panel 01 ============
  const panel1 = document.querySelectorAll('.panel')[0];
  if (panel1) {
    const ring = panel1.querySelector('circle[r="48"]');
    if (ring) gsap.to(ring, { attr: { r: 66 }, opacity: 0.05, duration: 2.6, repeat: -1, ease: 'power1.out', delay: 2.8, onStart: () => gsap.set(ring, { opacity: 0.5 }) });
  }
})();
</script></body></html>
