<script>
(() => {
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Left panel slide in from left
  tl.fromTo('#leftPanel', { opacity: 0, x: -40 }, { opacity: 1, x: 0, duration: 0.7 }, 0.8);
  // Right panel slide in from right
  tl.fromTo('#rightPanel', { opacity: 0, x: 40 }, { opacity: 1, x: 0, duration: 0.7 }, 0.9);

  // Divider line fades in first (quiet context)
  tl.to('#vsDividerLine', { opacity: 0.35, duration: 0.5 }, 1.2);

  // VS badge drops from above with gravitational bounce
  // (split from line so badge can dramatize while line stays put — line is neutral reference, badge is the hero)
  tl.fromTo('#vsBadge', { opacity: 0, y: -500 }, { opacity: 1, y: 0, duration: 1.1, ease: 'bounce.out' }, 1.4);

  // Features stagger (interleave left and right)
  tl.to('.feat', { opacity: 1, duration: 0.4, stagger: 0.08 }, 1.8);
  tl.to('.feat-r', { opacity: 1, duration: 0.4, stagger: 0.08 }, 1.85);

  // Verdict
  tl.to('#verdict', { opacity: 1, duration: 0.6 }, 3.4);

  // ============ PERPETUAL: VS ring pulse ============
  gsap.to('#vsRing1', { attr: { r: 68 }, opacity: 0, duration: 2.4, repeat: -1, ease: 'power1.out', delay: 3.8 });

  // ============ PERPETUAL: Right panel border breathing (Champion highlight) ============
  gsap.to('#rightPanel rect:first-child', { strokeWidth: 2, duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 });

  // ============ PERPETUAL: Row cross-hover — cycle row-by-row highlighting on both sides ============
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  let curRow = 0;
  function pulseRow() {
    const yRow = 265 + curRow * 73;
    const rectL = document.createElementNS(ns, 'rect');
    rectL.setAttribute('x', 38); rectL.setAttribute('y', yRow);
    rectL.setAttribute('width', 572); rectL.setAttribute('height', 73);
    rectL.setAttribute('fill', '#5dade2'); rectL.setAttribute('opacity', 0);
    svg.appendChild(rectL);
    const rectR = document.createElementNS(ns, 'rect');
    rectR.setAttribute('x', 798); rectR.setAttribute('y', yRow);
    rectR.setAttribute('width', 572); rectR.setAttribute('height', 73);
    rectR.setAttribute('fill', '#c4a35a'); rectR.setAttribute('opacity', 0);
    svg.appendChild(rectR);

    gsap.to([rectL, rectR], { opacity: 0.06, duration: 0.4, ease: 'power2.out' });
    gsap.to([rectL, rectR], {
      opacity: 0, duration: 1.2, delay: 0.6, ease: 'power2.in',
      onComplete: () => { rectL.remove(); rectR.remove(); }
    });
    curRow = (curRow + 1) % 6;
  }
  setInterval(pulseRow, 1400);
})();
</script></body></html>
