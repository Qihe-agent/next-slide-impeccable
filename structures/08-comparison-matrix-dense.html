<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  // Build 5-dot rating indicators
  document.querySelectorAll('.rating').forEach(g => {
    const n = parseInt(g.dataset.n);
    const c = g.dataset.c;
    const isWin = g.classList.contains('win');
    for (let i = 0; i < 5; i++) {
      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('cx', (i - 2) * 12);
      dot.setAttribute('cy', 0);
      dot.setAttribute('r', 3.5);
      dot.setAttribute('fill', i < n ? c : 'none');
      dot.setAttribute('stroke', c);
      dot.setAttribute('stroke-width', 0.8);
      dot.setAttribute('stroke-opacity', i < n ? 1 : 0.4);
      dot.setAttribute('opacity', 0);
      dot.classList.add('rdot');
      if (isWin && i < n) dot.setAttribute('filter', 'url(#glow)');
      g.appendChild(dot);
    }
    if (isWin) {
      const star = document.createElementNS(ns, 'text');
      star.setAttribute('x', 36);
      star.setAttribute('y', 4);
      star.setAttribute('font-family', 'JetBrains Mono');
      star.setAttribute('font-size', 10);
      star.setAttribute('font-weight', 700);
      star.setAttribute('fill', c);
      star.setAttribute('opacity', 0);
      star.classList.add('rstar');
      star.textContent = 'WIN';
      g.appendChild(star);
    }
  });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Header block
  tl.to('#tableHeader', { opacity: 1, duration: 0.4 }, 0.8);
  tl.to('.col-hdr', { scale: 1, opacity: 1, transformOrigin: (i, el) => `${parseFloat(el.firstElementChild.getAttribute('x')) + parseFloat(el.firstElementChild.getAttribute('width')) / 2}px 130px`, duration: 0.5, stagger: 0.08 }, 0.9);

  // Rows cascade top → bottom (each has transform="translate(0, Y)" — only fade in)
  tl.to('.trow', { opacity: 1, duration: 0.45, stagger: 0.11, ease: 'power2.out' }, 1.4);

  // Rating dots pop after each row appears (row cascade)
  document.querySelectorAll('.trow').forEach((row, rowIdx) => {
    const dots = row.querySelectorAll('.rdot');
    const stars = row.querySelectorAll('.rstar');
    gsap.to(dots, {
      opacity: 1, scale: 1, duration: 0.3, stagger: 0.02, ease: 'back.out(2)',
      delay: 1.55 + rowIdx * 0.11
    });
    gsap.to(stars, {
      opacity: 1, duration: 0.3, ease: 'back.out(2)',
      delay: 1.9 + rowIdx * 0.11
    });
  });

  // Total scores counter
  document.querySelectorAll('.totalNum').forEach((el, i) => {
    const target = parseFloat(el.dataset.target);
    gsap.to({ v: 0 }, {
      v: target, duration: 1.2, delay: 3.0 + i * 0.1, ease: 'power2.out',
      onUpdate: function () {
        el.textContent = this.targets()[0].v.toFixed(1);
      }
    });
  });

  // Verdict
  tl.to('#verdict', { opacity: 1, duration: 0.5 }, 3.3);

  // ============ PERPETUAL: Winner column border breath ============
  gsap.to('.col-winner .col-border', {
    strokeWidth: 2, strokeOpacity: 1, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4
  });

  // ============ PERPETUAL: Row highlight sweep ============
  let hlRow = 0;
  const rowY = [168, 218, 268, 318, 368, 418, 468, 518, 568, 618];
  function sweepRow() {
    const target = document.getElementById('rowHighlight');
    target.setAttribute('y', rowY[hlRow]);
    gsap.fromTo(target, { opacity: 0, attr: { 'fill-opacity': 0 } },
      { opacity: 1, attr: { 'fill-opacity': 0.04 }, duration: 0.6, yoyo: true, repeat: 1, ease: 'sine.inOut' });
    hlRow = (hlRow + 1) % rowY.length;
  }
  setInterval(sweepRow, 1800);
  setTimeout(sweepRow, 3500);

  // ============ PERPETUAL: Winner star wink ============
  gsap.to('.col-winner text:first-of-type', {
    opacity: 0.7, duration: 1.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.5
  });

  // ============ PERPETUAL: Total row emphasis breath ============
  gsap.to('.trow-total rect', {
    fillOpacity: 0.8, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4.5
  });
})();
</script></body></html>
