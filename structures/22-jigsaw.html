<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const ns = 'http://www.w3.org/2000/svg';
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to('.title', { opacity: 1, duration: 0.6 })
    .to('.subtitle', { opacity: 1, duration: 0.5 }, '-=0.3');

  // Pieces slide in from random directions with elastic ease
  const pieces = document.querySelectorAll('.piece');
  const dirs = [
    { x: -40, y: -30 }, { x: 0, y: -50 }, { x: 40, y: -30 },
    { x: -40, y: 30 }, { x: 0, y: 50 }, { x: 40, y: 30 },
  ];
  pieces.forEach((p, i) => {
    tl.fromTo(p, { opacity: 0, x: dirs[i].x, y: dirs[i].y, scale: 0.88, transformOrigin: 'center' },
      { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.7, ease: 'elastic.out(1, 0.7)' }, 0.8 + i * 0.1);
  });

  // Interface dots pulse in after pieces settle
  tl.to('#interfaceDots', { opacity: 1, duration: 0.5 }, 1.8);

  // Footer
  tl.to('#footerSum', { opacity: 1, duration: 0.5 }, 2.4);

  // ============ PERPETUAL: Completion flash — when all pieces in, flash a subtle overlay ============
  function completionFlash() {
    const flash = document.createElementNS(ns, 'rect');
    flash.setAttribute('x', 90); flash.setAttribute('y', 130);
    flash.setAttribute('width', 1220); flash.setAttribute('height', 560);
    flash.setAttribute('fill', '#c4a35a');
    flash.setAttribute('opacity', 0);
    flash.setAttribute('pointer-events', 'none');
    document.getElementById('svg').appendChild(flash);
    gsap.to(flash, { opacity: 0.04, duration: 0.3, ease: 'power2.out' });
    gsap.to(flash, { opacity: 0, duration: 1.2, delay: 0.5, ease: 'power2.in', onComplete: () => flash.remove() });
  }
  setTimeout(() => { completionFlash(); setInterval(completionFlash, 5200); }, 3000);

  // ============ PERPETUAL: Piece border subtle breath ============
  gsap.to('.pb', {
    strokeWidth: 2,
    duration: 2.8,
    repeat: -1,
    yoyo: true,
    ease: 'sine.inOut',
    stagger: { each: 0.18, from: 'random' },
    delay: 3.2
  });

  // ============ PERPETUAL: Interface dot pulse ============
  gsap.to('.iface-dot', {
    attr: { r: 4.5 }, opacity: 0.95,
    duration: 1.6,
    repeat: -1, yoyo: true,
    ease: 'sine.inOut',
    stagger: 0.2,
    delay: 3
  });

  // ============ PERPETUAL: Horizontal sweep band moving across all pieces ============
  const sweep = document.createElementNS(ns, 'rect');
  sweep.setAttribute('y', 140); sweep.setAttribute('width', 12); sweep.setAttribute('height', 540);
  sweep.setAttribute('fill', 'url(#sweepGrad)');
  sweep.setAttribute('opacity', 0.12);
  // Build gradient dynamically
  const defs = document.querySelector('defs');
  const sweepGrad = document.createElementNS(ns, 'linearGradient');
  sweepGrad.setAttribute('id', 'sweepGrad'); sweepGrad.setAttribute('x1', '0'); sweepGrad.setAttribute('x2', '1'); sweepGrad.setAttribute('y1', '0'); sweepGrad.setAttribute('y2', '0');
  sweepGrad.innerHTML = '<stop offset="0%" stop-color="#c4a35a" stop-opacity="0"/><stop offset="50%" stop-color="#c4a35a" stop-opacity="1"/><stop offset="100%" stop-color="#c4a35a" stop-opacity="0"/>';
  defs.appendChild(sweepGrad);
  document.getElementById('sweepBand').appendChild(sweep);
  let sx = 90;
  function sweepTick() {
    sx += 2.8;
    if (sx > 1320) sx = 80;
    sweep.setAttribute('x', sx);
    requestAnimationFrame(sweepTick);
  }
  setTimeout(sweepTick, 3600);
})();
</script></body></html>
