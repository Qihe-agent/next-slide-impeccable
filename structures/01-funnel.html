<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  const layerWidths = [1000, 800, 600, 400, 280];

  // ============ PERPETUAL LAYER 1: Corner ring rotate ============
  gsap.to('#ringInner', { rotation: 360, duration: 22, repeat: -1, ease: 'none', transformOrigin: '50% 50%' });
  gsap.to('#cornerRing circle:first-child', { attr: { r: 24 }, duration: 2.4, repeat: -1, yoyo: true, ease: 'sine.inOut' });

  // ============ PERPETUAL LAYER 2: Particle rain (rAF + DOM pool) ============
  const ns = 'http://www.w3.org/2000/svg';
  const pg = document.getElementById('particles');
  const POOL = 14;
  const particles = [];
  for (let i = 0; i < POOL; i++) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', 1.4);
    c.setAttribute('fill', '#c4a35a');
    c.setAttribute('opacity', 0);
    pg.appendChild(c);
    particles.push({ el: c, busy: false, x: 700, y: 130, vy: 0, life: 0, maxLife: 0 });
  }
  function spawn(p) {
    p.busy = true;
    p.x = 690 + Math.random() * 20;
    p.y = 130;
    p.vy = 0.8 + Math.random() * 0.9;
    p.life = 0;
    p.maxLife = 300 + Math.random() * 200;
    p.el.setAttribute('opacity', 0.3 + Math.random() * 0.4);
    p.el.setAttribute('r', 0.9 + Math.random() * 1.2);
  }
  let spawnAcc = 0;
  function rain() {
    spawnAcc++;
    if (spawnAcc > 8) {
      spawnAcc = 0;
      const free = particles.find(p => !p.busy);
      if (free) spawn(free);
    }
    particles.forEach(p => {
      if (!p.busy) return;
      p.y += p.vy;
      p.life++;
      // Keep particle near vertical center column (slight jitter)
      const dx = (Math.random() - 0.5) * 0.6;
      p.x += dx;
      p.el.setAttribute('cx', p.x);
      p.el.setAttribute('cy', p.y);
      const fade = 1 - p.life / p.maxLife;
      p.el.setAttribute('opacity', fade * 0.7);
      if (p.y > 620 || p.life > p.maxLife) {
        p.busy = false;
        p.el.setAttribute('opacity', 0);
      }
    });
    requestAnimationFrame(rain);
  }
  rain();

  // ============ ENTRANCE TIMELINE ============
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

  tl.to('#title', { opacity: 1, y: 0, duration: 0.7 })
    .to('#subtitle', { opacity: 1, duration: 0.5 }, '-=0.35');

  // Layers stagger top → bottom
  for (let i = 0; i < 5; i++) {
    const t = 0.8 + i * 0.28;
    tl.to(`#layer${i} .funnel-outline`, { opacity: 1, duration: 0.5 }, t);
    tl.to(`#layer${i} .layerTitle`, { opacity: 1, y: 0, duration: 0.4 }, t + 0.12);
    tl.to(`#layer${i} .lPct`, { opacity: 1, duration: 0.4 }, t + 0.15);
    tl.to(`#layer${i} .lDelta`, { opacity: 1, duration: 0.4 }, t + 0.22);
    tl.to(`#layer${i} .metric`, { opacity: 1, duration: 0.4 }, t + 0.28);
    tl.to(`#layer${i} .detail`, { opacity: 1, duration: 0.4 }, t + 0.36);
    tl.to(`#layer${i} .lossPanel`, { opacity: 1, x: 0, duration: 0.5 }, t + 0.32);
    tl.to(`.liqFill[data-i="${i}"]`, { width: layerWidths[i], duration: 1.1, ease: 'power1.out' }, t + 0.2);
  }

  // Arrows between layers
  tl.to('#arrows .convArrow', { opacity: 1, stagger: 0.2, duration: 0.3 }, 1.4);

  // Bottom chain chart
  tl.to('#chainChart', { opacity: 1, duration: 0.5 }, 2.4);
  tl.to('.chainBar', {
    attr: { width: (i, el) => parseFloat(el.dataset.w) },
    duration: 0.8,
    stagger: 0.12,
    ease: 'power2.out'
  }, 2.5);

  tl.to('#summary', { opacity: 1, duration: 0.6 }, 3.2);

  // Counters
  const counters = [
    { sel: '#cnt_imp', target: 10, decimals: 0, delay: 1.2 },
    { sel: '#cnt_ctr', target: 2.3, decimals: 1, delay: 1.3 },
    { sel: '#cnt_vis', target: 1.2, decimals: 1, delay: 1.5 },
    { sel: '#cnt_dwell', target: 42, decimals: 0, delay: 1.6 },
    { sel: '#cnt_sig', target: 280, decimals: 0, delay: 1.8 },
    { sel: '#cnt_act', target: 23.3, decimals: 1, delay: 1.9 },
    { sel: '#cnt_cust', target: 45, decimals: 0, delay: 2.1 },
    { sel: '#cnt_arpu', target: 2400, decimals: 0, delay: 2.2 },
    { sel: '#cnt_ren', target: 38, decimals: 0, delay: 2.4 },
    { sel: '#cnt_nrr', target: 118, decimals: 0, delay: 2.5 }
  ];
  counters.forEach(c => {
    const el = document.querySelector(c.sel);
    if (!el) return;
    gsap.to({ v: 0 }, {
      v: c.target, duration: 1.1, delay: c.delay, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = c.decimals ? v.toFixed(c.decimals) : Math.round(v).toLocaleString();
      }
    });
  });

  // Loss panel counters + chain bar counters
  document.querySelectorAll('.lossNum, .chainNum').forEach((el, idx) => {
    const target = parseFloat(el.dataset.target);
    const isChain = el.classList.contains('chainNum');
    gsap.to({ v: 0 }, {
      v: target, duration: 1.0, delay: isChain ? 2.6 + idx * 0.12 : 1.5 + idx * 0.2, ease: 'power2.out',
      onUpdate: function () {
        const v = this.targets()[0].v;
        el.textContent = target < 10 && !Number.isInteger(target) ? v.toFixed(1) : Math.round(v);
      }
    });
  });

  // ============ PERPETUAL LAYER 3: Liquid wave (subtle width breathing per layer) ============
  for (let i = 0; i < 5; i++) {
    gsap.to(`.liqFill[data-i="${i}"]`, {
      opacity: 0.55, duration: 2.2 + i * 0.15, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3 + i * 0.1
    });
  }

  // ============ PERPETUAL LAYER 4: Outline pulse (golden glow breath on funnel outlines) ============
  gsap.to('.funnel-outline', {
    strokeWidth: 2.2, duration: 2.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5
  });

  // ============ PERPETUAL LAYER 5: Arrow blink ============
  gsap.to('#arrows .convArrow', {
    opacity: 0.35, duration: 1.1, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.2, delay: 3.8
  });
})();
</script></body></html>
